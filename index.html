<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARMITARIA DA CHRIS | PEDIDO RÁPIDO</title>
    <style>
        :root { --primary: #ff4500; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; }
        .header { background: var(--primary); color: #fff; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: #fff; border-radius: 12px; padding: 10px; border: 1px solid #ddd; display: flex; flex-direction: column; }
        .img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        .name { font-size: 13px; font-weight: 700; margin: 8px 0; height: 32px; overflow: hidden; }
        .select { width: 100%; padding: 6px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 11px; }
        .price { font-size: 16px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .btn-add { background: #000; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #ddd; box-sizing: border-box; }
        .total-box { line-height: 1.2; }
        .btn-checkout { background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 700; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 100; }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-final { width: 100%; background: #25d366; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">MARMITARIA DA CHRIS 🍱</div>

    <div id="vitrine" class="grid"></div>

    <div class="footer">
        <div class="total-box">
            <small>SUBTOTAL</small><br>
            <strong>R$ <span id="total-val">0,00</span></strong>
        </div>
        <button class="btn-checkout" onclick="openCart(true)">FECHAR PEDIDO</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Finalizar Pedido</h3>
            <div id="resumo" style="font-size:14px; margin-bottom:15px; color:#555;"></div>
            <input type="text" id="nome" class="input" placeholder="Seu Nome">
            <input type="text" id="end" class="input" placeholder="Endereço Completo">
            <button class="btn-final" onclick="enviarZap()">PEDIR PELO WHATSAPP</button>
            <button onclick="openCart(false)" style="width:100%; background:none; border:none; color:#999; margin-top:10px;">Continuar Comprando</button>
        </div>
    </div>

    <script>
        // VALORES AJUSTADOS CONFORME OS PRINTS (3628 e 3629)
        const produtos = [
            { id: 1, nome: "Marmitex Padrão", preco: 17.00, misturas: ["Bife", "Frango", "Omelete"] },
            { id: 2, nome: "Marmitex Especial", preco: 22.00, misturas: ["Costela", "Feijoada", "Parmegiana"] }
        ];

        let carrinho = [];

        function render() {
            document.getElementById('vitrine').innerHTML = produtos.map(p => `
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=300" class="img">
                    <div class="name">${p.nome}</div>
                    <select id="sel-${p.id}" class="select">
                        <option value="">Escolha a Mistura</option>
                        ${p.misturas.map(m => `<option value="${m}">${m}</option>`).join('')}
                    </select>
                    <div class="price">R$ ${p.preco.toFixed(2).replace('.',',')}</div>
                    <button class="btn-add" onclick="add(${p.id})">ADICIONAR</button>
                </div>
            `).join('');
        }

        function add(id) {
            const mist = document.getElementById(`sel-${id}`).value;
            if(!mist) return alert("Selecione a mistura primeiro!");
            const p = produtos.find(x => x.id === id);
            carrinho.push({ ...p, mistura: mist });
            const total = carrinho.reduce((acc, i) => acc + i.preco, 0);
            document.getElementById('total-val').innerText = total.toFixed(2).replace('.',',');
            alert("Adicionado ao carrinho!");
        }

        function openCart(show) {
            document.getElementById('modal').style.display = show ? 'block' : 'none';
            document.getElementById('resumo').innerHTML = carrinho.length > 0 ? 
                carrinho.map(i => `• ${i.nome} (${i.mistura})`).join('<br>') : "Carrinho vazio";
        }

        function enviarZap() {
            const n = document.getElementById('nome').value;
            const e = document.getElementById('end').value;
            if(!n || !e || carrinho.length === 0) return alert("Preencha os dados!");

            let msg = `*NOVO PEDIDO - CHRIS*\n\n`;
            carrinho.forEach(i => msg += `✅ ${i.nome} - ${i.mistura}\n`);
            msg += `\n*TOTAL: R$ ${document.getElementById('total-val').innerText}*\n*CLIENTE:* ${n}\n*ENTREGA:* ${e}`;
            
            // NÚMERO DA CHRIS COLETADO NOS PRINTS
            window.open(`https://wa.me/5519971654019?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
