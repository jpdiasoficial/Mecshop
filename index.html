<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Oficial</title>
    <style>
        :root { --ifood-red: #ea1d2c; --text-dark: #3e3e3e; --text-light: #717171; }
        body { font-family: 'Helvetica Neue', Helvetica, sans-serif; margin: 0; background: #fff; color: var(--text-dark); padding-bottom: 140px; }

        .header { padding: 20px 15px; background: #fff; border-bottom: 1px solid #f2f2f2; font-weight: 700; text-transform: uppercase; }
        .banner-container { width: 100%; height: 160px; overflow: hidden; position: relative; background: #111; }
        .slider { display: flex; width: 300%; height: 100%; transition: transform 0.6s ease; }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .cat-bar { display: flex; overflow-x: auto; padding: 20px 15px; gap: 15px; scrollbar-width: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; min-width: 80px; border: none; background: none; cursor: pointer; }
        .cat-circle { width: 60px; height: 60px; background: #f8f8f8; border-radius: 50%; margin-bottom: 8px; border: 2px solid transparent; overflow: hidden; }
        .cat-circle img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card.active .cat-circle { border-color: var(--ifood-red); }
        .cat-name { font-size: 11px; font-weight: 700; color: var(--text-light); }

        /* Estilo do Formulário de Endereço */
        .address-section { padding: 20px 15px; background: #fdfdfd; border-top: 8px solid #f7f7f7; }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; color: var(--text-dark); }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .cep-input { width: 40%; }
        .readonly-input { background: #f2f2f2; cursor: not-allowed; }

        .menu-item { padding: 20px 15px; border-bottom: 1px solid #f2f2f2; }
        .item-title { font-size: 16px; font-weight: 700; }
        .size-box { display: flex; gap: 8px; margin: 12px 0; }
        .size-btn { border: 1px solid #dcdcdc; background: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .size-btn.active { border-color: var(--ifood-red); color: var(--ifood-red); background: #fff5f5; }

        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: #2e7d32; font-weight: 700; }
        .qty-box { display: flex; align-items: center; gap: 12px; background: #f2f2f2; border-radius: 20px; padding: 5px 12px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 12px; padding: 24px; text-align: center; }
        .wa-option { display: block; background: #25d366; color: #fff; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: 700; margin-bottom: 10px; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 500; }
        .btn-checkout { background: var(--ifood-red); color: #fff; border: none; padding: 14px 25px; border-radius: 6px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Chris Gastronomia</div>

    <div class="banner-container">
        <div class="slider" id="slider">
            <div class="slide"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600"></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=600"></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=600"></div>
        </div>
    </div>

    <div class="cat-bar">
        <button class="cat-card active" onclick="filter('todos', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100"></div><div class="cat-name">INICIO</div></button>
        <button class="cat-card" onclick="filter('marmita', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=100"></div><div class="cat-name">MARMITEX</div></button>
        <button class="cat-card" onclick="filter('batata', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=100"></div><div class="cat-name">BATATAS</div></button>
    </div>

    <div id="lista"></div>

    <section class="address-section">
        <div class="section-title">Dados para Entrega</div>
        <div class="input-group">
            <input type="text" id="cep" class="cep-input" placeholder="Seu CEP" onblur="buscarEndereco()" maxlength="8">
            <input type="text" id="rua" class="readonly-input" placeholder="Rua / Avenida" readonly>
        </div>
        <div class="input-group">
            <input type="text" id="bairro" class="readonly-input" placeholder="Bairro" readonly>
            <input type="text" id="numero" placeholder="Nº">
        </div>
        <input type="text" id="complemento" placeholder="Complemento (Ap, Bloco, Referência)">
    </section>

    <div id="waModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0 0 10px 0">Enviar pedido para:</h3>
            <a href="#" class="wa-option" onclick="enviar('5512997136890')">WhatsApp 1 (Final 6890)</a>
            <a href="#" class="wa-option" style="background:#128c7e" onclick="enviar('5512981906835')">WhatsApp 2 (Final 6835)</a>
            <button onclick="fecharModal()" style="background:none; border:none; color:var(--text-light); margin-top:10px; cursor:pointer;">Voltar</button>
        </div>
    </div>

    <div class="footer">
        <div><div style="font-size: 11px; color: var(--text-light);">Total</div><div style="font-size: 18px; font-weight: 700;">R$ <span id="total">0,00</span></div></div>
        <button class="btn-checkout" onclick="abrirModal()">Finalizar Pedido</button>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", desc: "Arroz, feijao, mistura, guarnicao, repolho e salada.", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Strogonoff", desc: "Batata premium com recheio cremoso.", sizes: { "Padrao": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Frango", desc: "Frango desfiado com requeijao.", sizes: { "Padrao": 25.00 } },
            { id: 4, cat: 'batata', nome: "Batata Calabresa / Bacon", desc: "Recheio especial crocante.", sizes: { "Padrao": 25.00 } }
        ];

        let cart = [];
        let selection = {};

        function buscarEndereco() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(r => r.json())
                    .then(d => {
                        if (!d.erro) {
                            document.getElementById('rua').value = d.logradouro;
                            document.getElementById('bairro').value = d.bairro;
                        } else { alert("CEP não encontrado."); }
                    });
            }
        }

        function render(itens = produtos) {
            const container = document.getElementById('lista');
            container.innerHTML = itens.map(p => {
                const sizes = Object.keys(p.sizes);
                if (!selection[p.id]) selection[p.id] = sizes[0];
                const currentSize = selection[p.id];
                const itemCart = cart.find(i => i.id === p.id && i.size === currentSize) || {qtd: 0};
                return `
                    <div class="menu-item">
                        <div class="item-title">${p.nome}</div>
                        <div class="item-desc">${p.desc}</div>
                        <div class="size-box">${sizes.map(s => `<button class="size-btn ${s === currentSize ? 'active' : ''}" onclick="setSize(${p.id}, '${s}')">${s}</button>`).join('')}</div>
                        <div class="item-footer">
                            <div class="price">R$ ${p.sizes[currentSize].toFixed(2).replace('.',',')}</div>
                            <div class="qty-box"><button class="btn-q" onclick="update(${p.id}, -1)">-</button><span class="qty-val">${itemCart.qtd}</span><button class="btn-q" onclick="update(${p.id}, 1)">+</button></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setSize(id, s) { selection[id] = s; render(); }
        function update(id, d) {
            const s = selection[id];
            const p = produtos.find(x => x.id === id);
            const idx = cart.findIndex(i => i.id === id && i.size === s);
            if (idx > -1) { cart[idx].qtd += d; if (cart[idx].qtd <= 0) cart.splice(idx, 1); }
            else if (d > 0) cart.push({ id, nome: p.nome, size: s, preco: p.sizes[s], qtd: 1 });
            render();
            const total = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            document.getElementById('total').innerText = total.toFixed(2).replace('.',',');
        }

        function filter(c, b) {
            document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            render(c === 'todos' ? produtos : produtos.filter(p => p.cat === c));
        }

        function abrirModal() {
            if(!cart.length) return alert("Adicione itens ao carrinho.");
            if(!document.getElementById('numero').value) return alert("Informe o número do endereço.");
            document.getElementById('waModal').style.display = 'flex';
        }
        function fecharModal() { document.getElementById('waModal').style.display = 'none'; }

        function enviar(num) {
            const rua = document.getElementById('rua').value;
            const n = document.getElementById('numero').value;
            const b = document.getElementById('bairro').value;
            const c = document.getElementById('complemento').value;
            
            let msg = `*PEDIDO - CHRIS GASTRONOMIA*\n\n`;
            cart.forEach(i => msg += `• ${i.qtd}x ${i.nome} (${i.size})\n`);
            msg += `\n*ENTREGA:* ${rua}, ${n} - ${b}\n*REF:* ${c}`;
            msg += `\n\n*TOTAL: R$ ${document.getElementById('total').innerText}*`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
            fecharModal();
        }

        render();
    </script>
</body>
</html>
