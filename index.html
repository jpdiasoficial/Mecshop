<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Cardápio Digital</title>
    <style>
        :root { --ifood-red: #ea1d2c; --text-dark: #3e3e3e; --text-light: #717171; }
        body { font-family: 'Helvetica Neue', Helvetica, sans-serif; margin: 0; background: #fff; color: var(--text-dark); padding-bottom: 100px; }

        /* Header */
        .header { padding: 20px 15px; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #f2f2f2; }
        .brand { font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* Banner Slider */
        .banner-container { width: 100%; height: 180px; overflow: hidden; position: relative; background: #111; }
        .slider { display: flex; width: 300%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .slide-txt { position: absolute; bottom: 20px; left: 15px; color: #fff; font-weight: 600; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* Categorias Estilo iFood */
        .cat-bar { display: flex; overflow-x: auto; padding: 20px 15px; gap: 15px; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; min-width: 75px; border: none; background: none; cursor: pointer; }
        .cat-img { width: 65px; height: 65px; background: #f8f8f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 8px; border: 2px solid transparent; }
        .cat-card.active .cat-img { border-color: var(--ifood-red); background: #fff; }
        .cat-name { font-size: 12px; font-weight: 600; color: var(--text-light); }
        .cat-card.active .cat-name { color: var(--ifood-red); }

        /* Menu */
        .menu-item { padding: 20px 15px; border-bottom: 1px solid #f2f2f2; }
        .item-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .item-desc { font-size: 13px; color: var(--text-light); line-height: 1.4; margin-bottom: 12px; }
        
        /* Seletor de Tamanhos */
        .size-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .size-btn { border: 1px solid #dcdcdc; background: #fff; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .size-btn.active { border-color: var(--ifood-red); color: var(--ifood-red); background: #fff5f5; }

        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: #2e7d32; font-weight: 700; font-size: 17px; }
        .qty-box { display: flex; align-items: center; gap: 12px; background: #f2f2f2; border-radius: 20px; padding: 5px 12px; }
        .btn-q { border: none; background: none; color: var(--ifood-red); font-size: 20px; font-weight: 700; cursor: pointer; width: 25px; }
        .qty-val { font-weight: 700; font-size: 14px; }

        /* Footer */
        .checkout-bar { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-send { background: var(--ifood-red); color: #fff; border: none; padding: 14px 25px; border-radius: 6px; font-weight: 700; font-size: 15px; }
    </style>
</head>
<body>

    <div class="header"><div class="brand">Chris Gastronomia</div></div>

    <div class="banner-container">
        <div class="slider" id="slider">
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600">
                <div class="slide-txt">Comida Caseira com Sabor e Carinho</div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=600">
                <div class="slide-txt">Batatas Recheadas das 18h às 22h</div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=600">
                <div class="slide-txt">Av. Theodorico Cavalcante de Souza, 1305</div>
            </div>
        </div>
    </div>

    <div class="cat-bar">
        <button class="cat-card active" onclick="filter('todos', this)"><div class="cat-img">🌟</div><div class="cat-name">Início</div></button>
        <button class="cat-card" onclick="filter('marmita', this)"><div class="cat-img">🍱</div><div class="cat-name">Marmitex</div></button>
        <button class="cat-card" onclick="filter('batata', this)"><div class="cat-img">🥔</div><div class="cat-name">Batatas</div></button>
    </div>

    <div id="lista"></div>

    <div class="checkout-bar">
        <div><div style="font-size: 11px; color: var(--text-light);">Subtotal</div><div style="font-size: 18px; font-weight: 700;">R$ <span id="total">0,00</span></div></div>
        <button class="btn-send" onclick="finalizar()">Enviar Pedido</button>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", desc: "Arroz, feijão, mistura, guarnição, repolho e salada.", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Strogonoff de Carne", desc: "Batata recheada com muito amor e carinho.", sizes: { "Padrão": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Frango Desfiado", desc: "Recheio cremoso com temperos selecionados.", sizes: { "Padrão": 25.00 } },
            { id: 4, cat: 'batata', nome: "Batata Calabresa / Bacon", desc: "A queridinha do cardápio noturno.", sizes: { "Padrão": 25.00 } }
        ];

        let cart = [];
        let selection = {}; 

        function render(itens = produtos) {
            const container = document.getElementById('lista');
            container.innerHTML = itens.map(p => {
                const sizes = Object.keys(p.sizes);
                if (!selection[p.id]) selection[p.id] = sizes[0];
                const currentSize = selection[p.id];
                const itemCart = cart.find(i => i.id === p.id && i.size === currentSize) || {qtd: 0};

                return `
                    <div class="menu-item">
                        <div class="item-title">${p.nome}</div>
                        <div class="item-desc">${p.desc}</div>
                        
                        <div class="size-box">
                            ${sizes.map(s => `
                                <button class="size-btn ${s === currentSize ? 'active' : ''}" 
                                        onclick="setSize(${p.id}, '${s}')">${s}</button>
                            `).join('')}
                        </div>

                        <div class="item-footer">
                            <div class="price">R$ ${p.sizes[currentSize].toFixed(2).replace('.',',')}</div>
                            <div class="qty-box">
                                <button class="btn-q" onclick="update(${p.id}, -1)">-</button>
                                <span class="qty-val">${itemCart.qtd}</span>
                                <button class="btn-q" onclick="update(${p.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setSize(id, size) { selection[id] = size; render(); }

        function update(id, delta) {
            const size = selection[id];
            const p = produtos.find(x => x.id === id);
            const idx = cart.findIndex(i => i.id === id && i.size === size);

            if (idx > -1) {
                cart[idx].qtd += delta;
                if (cart[idx].qtd <= 0) cart.splice(idx, 1);
            } else if (delta > 0) {
                cart.push({ id, nome: p.nome, size, preco: p.sizes[size], qtd: 1 });
            }
            render();
            const total = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            document.getElementById('total').innerText = total.toFixed(2).replace('.',',');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'todos' ? produtos : produtos.filter(p => p.cat === cat));
        }

        function finalizar() {
            if(!cart.length) return alert("Selecione um item!");
            let msg = `*PEDIDO CHRIS GASTRONOMIA*\n\n`;
            cart.forEach(i => msg += `• ${i.qtd}x ${i.nome} [${i.size}]\n`);
            msg += `\n*TOTAL: R$ ${document.getElementById('total').innerText}*`;
            window.open(`https://wa.me/5512997136890?text=${encodeURIComponent(msg)}`);
        }

        let cur = 0;
        setInterval(() => {
            cur = (cur + 1) % 3;
            document.getElementById('slider').style.transform = `translateX(-${cur * 33.33}%)`;
        }, 4000);

        render();
    </script>
</body>
</html>
