<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Oficial</title>
    <style>
        :root { --ifood-red: #ea1d2c; --text-dark: #3e3e3e; --text-light: #717171; }
        body { font-family: 'Helvetica Neue', Helvetica, sans-serif; margin: 0; background: #fff; color: var(--text-dark); padding-bottom: 100px; }

        /* Header e Banner Profissional */
        .header { padding: 20px 15px; background: #fff; border-bottom: 1px solid #f2f2f2; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .banner-container { width: 100%; height: 180px; overflow: hidden; position: relative; background: #111; }
        .slider { display: flex; width: 300%; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .slide-txt { position: absolute; bottom: 20px; left: 15px; color: #fff; font-weight: 600; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); font-size: 14px; }

        /* Categorias com Fotos Reais (Sem Emojis) */
        .cat-bar { display: flex; overflow-x: auto; padding: 20px 15px; gap: 15px; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; min-width: 85px; border: none; background: none; cursor: pointer; }
        .cat-circle { width: 65px; height: 65px; background: #f8f8f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 8px; border: 2px solid transparent; overflow: hidden; }
        .cat-circle img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card.active .cat-circle { border-color: var(--ifood-red); background: #fff; }
        .cat-name { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

        /* Itens do Menu */
        .menu-item { padding: 20px 15px; border-bottom: 1px solid #f2f2f2; }
        .item-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .item-desc { font-size: 13px; color: var(--text-light); line-height: 1.4; margin-bottom: 12px; }
        
        /* Seletor de Tamanhos */
        .size-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .size-btn { border: 1px solid #dcdcdc; background: #fff; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .size-btn.active { border-color: var(--ifood-red); color: var(--ifood-red); background: #fff5f5; }

        /* Rodapé do Item */
        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: #2e7d32; font-weight: 700; font-size: 17px; }
        .qty-box { display: flex; align-items: center; gap: 12px; background: #f2f2f2; border-radius: 20px; padding: 5px 12px; }
        .btn-q { border: none; background: none; color: var(--ifood-red); font-size: 20px; font-weight: 700; cursor: pointer; width: 25px; }

        /* MODAL DE CHECKOUT (Endereço na Finalização) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        .modal-content { background: #fff; width: 100%; max-width: 450px; border-radius: 15px; padding: 25px; box-sizing: border-box; }
        .address-form h3 { margin-top: 0; font-size: 18px; border-bottom: 2px solid #f2f2f2; padding-bottom: 10px; text-align: left; }
        .input-group { display: flex; gap: 8px; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: #fdfdfd; }
        input:focus { border-color: var(--ifood-red); outline: none; }
        .readonly { background: #eee !important; cursor: not-allowed; }
        .wa-btn { display: block; background: #25d366; color: #fff; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: 700; margin-bottom: 10px; text-align: center; font-size: 14px; }

        /* Footer Fixo */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 500; }
        .btn-checkout { background: var(--ifood-red); color: #fff; border: none; padding: 14px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Chris Gastronomia</div>

    <div class="banner-container">
        <div class="slider" id="slider">
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=800">
                <div class="slide-txt">Sabor Caseiro Preparado com Carinho</div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=800">
                <div class="slide-txt">Batatas Recheadas Premium: 18h às 22h</div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=800">
                <div class="slide-txt">Av. Theodorico Cavalcante de Souza, 1305</div>
            </div>
        </div>
    </div>

    <div class="cat-bar">
        <button class="cat-card active" onclick="filter('todos', this)">
            <div class="cat-circle"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100"></div>
            <div class="cat-name">INICIO</div>
        </button>
        <button class="cat-card" onclick="filter('marmita', this)">
            <div class="cat-circle"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=100"></div>
            <div class="cat-name">MARMITEX</div>
        </button>
        <button class="cat-card" onclick="filter('batata', this)">
            <div class="cat-circle"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=100"></div>
            <div class="cat-name">BATATAS</div>
        </button>
        <button class="cat-card" onclick="filter('bebida', this)">
            <div class="cat-circle"><img src="https://images.unsplash.com/photo-1581009146145-b5ef03a7403f?w=100"></div>
            <div class="cat-name">BEBIDAS</div>
        </button>
    </div>

    <div id="lista"></div>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <div class="address-form">
                <h3>Finalizar Pedido</h3>
                <p style="font-size: 12px; color: var(--text-light); margin-bottom: 15px; text-align: left;">Preencha onde devemos entregar:</p>
                <div class="input-group">
                    <input type="text" id="cep" placeholder="CEP" onblur="buscarEndereco()" maxlength="8">
                    <input type="text" id="numero" placeholder="Nº">
                </div>
                <input type="text" id="rua" placeholder="Rua / Avenida" class="readonly" readonly style="margin-bottom: 8px;">
                <input type="text" id="bairro" placeholder="Bairro" class="readonly" readonly style="margin-bottom: 8px;">
                <input type="text" id="complemento" placeholder="Apto, Bloco ou Referência">
            </div>

            <p style="font-weight: 700; margin-bottom: 15px;">Enviar para o WhatsApp:</p>
            <a href="#" class="wa-btn" onclick="enviar('5512997136890')">ATENDIMENTO 1 (Final 6890)</a>
            <a href="#" class="wa-btn" style="background:#128c7e" onclick="enviar('5512981906835')">ATENDIMENTO 2 (Final 6835)</a>
            
            <button onclick="fecharModal()" style="background:none; border:none; color:var(--text-light); margin-top:15px; cursor:pointer; font-weight:700;">← Voltar ao cardápio</button>
        </div>
    </div>

    <div class="footer">
        <div><div style="font-size: 11px; color: var(--text-light);">Subtotal</div><div style="font-size: 18px; font-weight: 700;">R$ <span id="total">0,00</span></div></div>
        <button class="btn-checkout" onclick="abrirModal()">Concluir Pedido</button>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", desc: "Arroz, feijão, mistura, guarnição e salada.", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Strogonoff", desc: "Batata premium recheada.", sizes: { "Padrão": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Frango cremoso", desc: "Frango desfiado com requeijão.", sizes: { "Padrão": 25.00 } },
            { id: 4, cat: 'batata', nome: "Batata Calabresa / Bacon", desc: "Sabor marcante e crocante.", sizes: { "Padrão": 25.00 } },
            { id: 5, cat: 'bebida', nome: "Coca-Cola", desc: "Gelada.", sizes: { "Lata": 6.00, "600ml": 9.00, "2L": 14.00 } },
            { id: 6, cat: 'bebida', nome: "Guaraná Antarctica", desc: "Refrescante.", sizes: { "Lata": 6.00, "2L": 12.00 } }
        ];

        let cart = []; let selection = {};

        function buscarEndereco() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r => r.json()).then(d => {
                    if (!d.erro) {
                        document.getElementById('rua').value = d.logradouro;
                        document.getElementById('bairro').value = d.bairro;
                    }
                });
            }
        }

        function render(itens = produtos) {
            const container = document.getElementById('lista');
            container.innerHTML = itens.map(p => {
                const s = selection[p.id] || Object.keys(p.sizes)[0];
                selection[p.id] = s;
                const item = cart.find(i => i.id === p.id && i.size === s) || {qtd: 0};
                return `
                    <div class="menu-item">
                        <div class="item-title">${p.nome}</div>
                        <div class="size-box">${Object.keys(p.sizes).map(sz => `<button class="size-btn ${sz === s ? 'active' : ''}" onclick="setSize(${p.id}, '${sz}')">${sz}</button>`).join('')}</div>
                        <div class="item-footer">
                            <div class="price">R$ ${p.sizes[s].toFixed(2).replace('.',',')}</div>
                            <div class="qty-box">
                                <button class="btn-q" onclick="update(${p.id}, -1)">-</button>
                                <span>${item.qtd}</span>
                                <button class="btn-q" onclick="update(${p.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function setSize(id, sz) { selection[id] = sz; render(); }
        function update(id, d) {
            const s = selection[id]; const p = produtos.find(x => x.id === id); const idx = cart.findIndex(i => i.id === id && i.size === s);
            if (idx > -1) { cart[idx].qtd += d; if (cart[idx].qtd <= 0) cart.splice(idx, 1); }
            else if (d > 0) cart.push({ id, nome: p.nome, size: s, preco: p.sizes[s], qtd: 1 });
            render();
            document.getElementById('total').innerText = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0).toFixed(2).replace('.',',');
        }
        function filter(c, b) { document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(c === 'todos' ? produtos : produtos.filter(p => p.cat === c)); }
        function abrirModal() { if(!cart.length) return alert("Seu carrinho está vazio!"); document.getElementById('checkoutModal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('checkoutModal').style.display = 'none'; }
        function enviar(num) {
            const rua = document.getElementById('rua').value; const n = document.getElementById('numero').value;
            if(!rua || !n) return alert("Por favor, preencha o CEP e o Número.");
            let msg = `*PEDIDO - CHRIS GASTRONOMIA*\n\n`;
            cart.forEach(i => msg += `• ${i.qtd}x ${i.nome} (${i.size})\n`);
            msg += `\n*ENTREGA:* ${rua}, ${n}\n*BAIRRO:* ${document.getElementById('bairro').value}\n*REF:* ${document.getElementById('complemento').value}`;
            msg += `\n\n*TOTAL: R$ ${document.getElementById('total').innerText}*`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
        }
        render();
    </script>
</body>
</html>
