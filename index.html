<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Allan - Controle de Estoque</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .badge { background: #ff4757; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; display: none; }
        img { width: 100%; border-radius: 10px; }
        .price-box { margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px; }
        .wholesale { color: #2ed573; font-weight: bold; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #1e90ff; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="card" id="card-01">
        <span id="badge-01" class="badge">ESGOTADO</span>
        <img src="https://via.placeholder.com/250x250?text=Sorvete+2L" alt="Produto">
        <h3>Leitinho Trufado 2L</h3>
        
        <div class="price-box">
            <p id="varejo-01">Varejo: R$ 45,00</p>
            <p id="atacado-01" class="wholesale">Atacado (10+): R$ 38,00</p>
        </div>

        <button id="btn-01">COMPRAR NO WHATSAPP</button>
    </div>

    <script>
        // ESTA FUNÇÃO SIMULA A LEITURA DA PLANILHA DO GOOGLE
        function simularPlanilha(statusEstoque) {
            const btn = document.getElementById('btn-01');
            const badge = document.getElementById('badge-01');

            if (statusEstoque === "ESGOTADO") {
                btn.disabled = true;
                btn.innerText = "INDISPONÍVEL";
                badge.style.display = "inline-block";
            } else {
                btn.disabled = false;
                btn.innerText = "COMPRAR NO WHATSAPP";
                badge.style.display = "none";
            }
        }

        // Exemplo: Se na planilha estiver 'ESGOTADO', o site fica assim:
        simularPlanilha("DISPONÍVEL"); // Mude para "ESGOTADO" para testar
    </script>
</body>
</html>
