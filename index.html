<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITEBET | DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff41; --bg-dark: #050709; --card-bg: #12151a; --border-color: #23272e; --text-main: #ffffff; --text-muted: #8a939e; --accent-orange: #ff5e00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: var(--card-bg); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border-color); z-index: 1000; justify-content: space-between; }
        .logo-box { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; text-transform: uppercase; }
        .logo-box span { color: var(--primary); }
        .balance-chip { background: #1c2128; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-color); font-weight: 700; font-size: 14px; color: var(--primary); }

        /* SIDE NAVIGATION */
        .side-nav { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card-bg); z-index: 1100; transition: 0.3s; border-right: 1px solid var(--border-color); padding: 20px; }
        .side-nav.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1050; display: none; }
        .overlay.active { display: block; }

        /* SCREENS */
        .main-container { padding: 80px 16px 100px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS */
        .form-card { background: var(--card-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color); margin-bottom: 16px; }
        .field-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; display: block; }
        input { width: 100%; background: #0a0c10; border: 1px solid var(--border-color); padding: 14px; border-radius: 8px; color: #fff; margin-bottom: 16px; outline: none; }
        
        .btn-action { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-confirm { background: var(--primary); color: #000; }

        /* WHEEL */
        .wheel-wrapper { position: relative; width: 220px; height: 220px; margin: 25px auto; }
        .wheel-body { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #1c2128; background: conic-gradient(#000 0% 12.5%, #15191f 12.5% 25%, #000 25% 37.5%, #15191f 37.5% 50%, #000 50% 62.5%, #15191f 62.5% 75%, #000 75% 87.5%, #15191f 87.5% 100%); transition: 4s cubic-bezier(0.15, 0, 0.15, 1); }

        /* BOTTOM TAB NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--card-bg); border-top: 1px solid var(--border-color); display: none; align-items: center; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; color: var(--text-muted); font-size: 10px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="side-nav" id="side-nav">
        <div class="logo-box">ELITE<span>BET</span></div>
        <div style="margin-top: 30px;">
            <div style="padding: 15px 0; border-bottom: 1px solid #1c2128; cursor: pointer;" onclick="irPara('scr-lobby'); toggleMenu()">Lobby</div>
            <div style="padding: 15px 0; border-bottom: 1px solid #1c2128; cursor: pointer;" onclick="irPara('scr-roleta'); toggleMenu()">Roleta</div>
            <div id="side-admin" style="padding: 15px 0; color: var(--accent-orange); display:none;" onclick="irPara('scr-admin'); toggleMenu()">Admin</div>
            <div style="padding: 15px 0; color: #ff4b4b; margin-top: 20px;" onclick="location.reload()">Sair</div>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <button class="header-btn" onclick="toggleMenu()" style="background:none; border:none; color:white;"><i class="fa-solid fa-bars"></i></button>
        <div class="logo-box">ELITE<span>BET</span></div>
        <div class="balance-chip" id="top-balance">R$ 0,00</div>
    </header>

    <div class="main-container">
        
        <div id="scr-login" class="screen active">
            <div class="form-card">
                <h2 style="text-align:center; margin-bottom:20px;">ENTRAR</h2>
                <span class="field-label">Usuário</span>
                <input type="text" id="l-user">
                <span class="field-label">Senha</span>
                <input type="password" id="l-pass">
                <button class="btn-action btn-confirm" onclick="fazerLogin()">Acessar Conta</button>
            </div>
        </div>

        <div id="scr-lobby" class="screen">
            <div class="form-card" style="text-align:center;">
                <span class="field-label">Saldo em Conta</span>
                <h1 id="lobby-balance" style="font-size:36px;">R$ 0,00</h1>
            </div>
            <div class="form-card" onclick="irPara('scr-roleta')" style="cursor:pointer; background: linear-gradient(90deg, #12151a, #1c2128);">
                <div style="font-weight:700;">🎡 ROLETA DIÁRIA</div>
                <div style="font-size:11px; color:var(--text-muted);">Clique para girar seu bônus.</div>
            </div>
        </div>

        <div id="scr-roleta" class="screen">
            <div class="form-card" style="text-align:center;">
                <h2>SORTEIO</h2>
                <div class="wheel-wrapper">
                    <div class="wheel-body" id="wheel-obj"></div>
                </div>
                <button class="btn-action btn-confirm" onclick="girar()">Girar Agora</button>
            </div>
        </div>

        <div id="scr-admin" class="screen">
            <div class="form-card">
                <h2 style="color:var(--accent-orange);">GERENCIAMENTO</h2>
                <input type="number" id="adm-s" placeholder="Novo Saldo R$">
                <button class="btn-action btn-confirm" onclick="salvarAdmin()">Atualizar Saldo</button>
            </div>
        </div>

    </div>

    <nav class="bottom-nav" id="bottom-bar">
        <div class="tab-item active" onclick="irPara('scr-lobby')"><i class="fa-solid fa-house"></i><br>Início</div>
        <div class="tab-item" onclick="irPara('scr-roleta')"><i class="fa-solid fa-circle-dot"></i><br>Roleta</div>
        <div id="nav-adm-btn" class="tab-item" onclick="irPara('scr-admin')" style="display:none;"><i class="fa-solid fa-lock"></i><br>Admin</div>
    </nav>

    <script>
        let saldo = 2500.00;

        function toggleMenu() {
            document.getElementById('side-nav').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function irPara(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function fazerLogin() {
            const user = document.getElementById('l-user').value.toLowerCase();
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('bottom-bar').style.display = 'flex';
            
            if(user === 'admin') {
                document.getElementById('nav-adm-btn').style.display = 'flex';
                document.getElementById('side-admin').style.display = 'block';
            }
            irPara('scr-lobby');
            updateUI();
        }

        function updateUI() {
            const valor = "R$ " + saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            document.getElementById('top-balance').innerText = valor;
            document.getElementById('lobby-balance').innerText = valor;
        }

        function girar() {
            const w = document.getElementById('wheel-obj');
            w.style.transform = `rotate(${Math.floor(Math.random() * 3600) + 7200}deg)`;
        }

        function salvarAdmin() {
            const novo = parseFloat(document.getElementById('adm-s').value);
            if(!isNaN(novo)) {
                saldo = novo;
                updateUI();
                alert("Sincronizado!");
            }
        }
    </script>
</body>
</html>
