<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC SHOP | OFICIAL</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --btn-green: #2ecc71;
            --discount-red: #ff4757;
            --bg-gray: #f0f2f5;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-gray); padding-bottom: 240px; }

        /* SLIDER NO TOPO (SUBSTITUINDO O NOME) */
        .header-slider { width: 100%; height: 180px; overflow: hidden; background: #000; border-bottom: 2px solid var(--neon-blue); }
        .slider-track { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .slider-track img { width: 100%; flex-shrink: 0; object-fit: cover; }

        /* PESQUISA */
        .search-container { padding: 12px; background: #fff; }
        .search-bar { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; }

        /* GRID E CARDS */
        .loja-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .produto-caixa { background: #fff; border-radius: 20px; padding: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .off-badge { position: absolute; top: 10px; left: 10px; background: var(--discount-red); color: #fff; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; }
        .img-produto { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        
        .nome { font-size: 13px; font-weight: 700; color: #333; height: 35px; overflow: hidden; }
        .preco-por { color: #000; font-size: 20px; font-weight: 900; display: block; margin: 5px 0; }

        /* CONTROLES DE QUANTIDADE */
        .qtd-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; background: #f8f8f8; border-radius: 8px; padding: 5px; }
        .btn-qtd { background: none; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: #333; width: 30px; }
        .qtd-num { font-weight: 800; font-size: 15px; min-width: 20px; }

        .btn-add { background: #000; color: var(--neon-blue); border: 2px solid var(--neon-blue); padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 800; font-size: 11px; }

        /* BARRA DE CHECKOUT */
        .barra-checkout { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 20px; z-index: 10000; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); border-radius: 35px 35px 0 0; }
        #lista-visual { font-size: 12px; color: #00a8e8; text-align: center; font-weight: 700; margin-bottom: 12px; }
        .checkout-flex { display: flex; align-items: center; gap: 12px; }
        
        /* BOTÃO CARRINHO (LIMPAR) */
        .btn-carrinho { background: #f1f1f1; border: none; padding: 12px; border-radius: 15px; cursor: pointer; }
        .btn-carrinho img { width: 24px; height: 24px; }

        .btn-fechar { background: var(--btn-green); color: #fff; border: none; padding: 18px; border-radius: 18px; font-weight: 900; flex-grow: 1; font-size: 16px; cursor: pointer; }

        /* SUPORTE */
        .btn-suporte { position: fixed; bottom: 230px; right: 15px; background-color: #25d366; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="header-slider" id="sliderTop">
        <div class="slider-track">
            <img src="banner1.jpg" alt="Oferta 1">
            <img src="banner2.jpg" alt="Oferta 2">
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar produto..." onkeyup="filtrar()">
    </div>

    <a href="https://wa.me/5511999999999" class="btn-suporte" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30">
    </a>

    <div id="vitrine" class="loja-grid"></div>

    <div class="barra-checkout">
        <div id="lista-visual">Carrinho vazio</div>
        <div class="checkout-flex">
            <button class="btn-carrinho" onclick="limparCarrinho()">
                <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="Limpar">
            </button>
            <button class="btn-fechar" onclick="finalizar()">FINALIZAR (R$ <span id="total-v">0,00</span>)</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, off: "10% OFF", nome: "Produto Exemplo 01", preco: 187.00, img: "p1.jpg" },
            { id: 2, off: "20% OFF", nome: "Produto Exemplo 02", preco: 79.90, img: "p2.jpg" }
        ];

        function render(itens) {
            const v = document.getElementById('vitrine');
            v.innerHTML = "";
            itens.forEach(p => {
                v.innerHTML += `
                <div class="produto-caixa">
                    <div class="off-badge">${p.off}</div>
                    <img src="${p.img}" class="img-produto" onerror="this.src='https://via.placeholder.com/150'">
                    <span class="nome">${p.nome}</span>
                    <span class="preco-por">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                    <div class="qtd-container">
                        <button class="btn-qtd" onclick="mudarQtd('${p.id}', -1)">-</button>
                        <span class="qtd-num" id="qtd-${p.id}">1</span>
                        <button class="btn-qtd" onclick="mudarQtd('${p.id}', 1)">+</button>
                    </div>
                    <button class="btn-add" onclick="add('${p.id}')">ADICIONAR</button>
                </div>`;
            });
        }

        function mudarQtd(id, val) {
            let el = document.getElementById('qtd-'+id);
            let n = parseInt(el.innerText) + val;
            if(n > 0) el.innerText = n;
        }

        let totalG = 0; let car = {};

        function add(id) {
            const p = produtos.find(x => x.id == id);
            const qtd = parseInt(document.getElementById('qtd-'+id).innerText);
            car[p.nome] = (car[p.nome] || 0) + qtd;
            totalG += p.preco * qtd;
            up();
        }

        function up() {
            document.getElementById('total-v').innerText = totalG.toFixed(2).replace('.', ',');
            let r = "";
            for(let n in car) r += `${car[n]}x ${n} | `;
            document.getElementById('lista-visual').innerText = r || "Carrinho vazio";
        }

        function limparCarrinho() { totalG = 0; car = {}; up(); }

        function filtrar() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            render(produtos.filter(p => p.nome.toLowerCase().includes(t)));
        }

        // Slider Auto
        let index = 0;
        setInterval(() => {
            const track = document.querySelector('.slider-track');
            index = (index + 1) % 2; // Altere para o número de imagens que tiver
            track.style.transform = `translateX(-${index * 100}%)`;
        }, 3000);

        render(produtos);
    </script>
</body>
</html>
