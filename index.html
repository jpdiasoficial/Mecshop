<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Oficial</title>
    <style>
        :root { --ifood-red: #ea1d2c; --text-dark: #3e3e3e; --text-light: #717171; }
        body { font-family: 'Helvetica Neue', Helvetica, sans-serif; margin: 0; background: #fff; color: var(--text-dark); padding-bottom: 120px; }

        /* Header e Banner */
        .header { padding: 20px 15px; background: #fff; border-bottom: 1px solid #f2f2f2; font-weight: 700; text-transform: uppercase; }
        .banner-container { width: 100%; height: 180px; overflow: hidden; position: relative; background: #111; }
        .slider { display: flex; width: 300%; height: 100%; transition: transform 0.6s ease; }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .slide-txt { position: absolute; bottom: 15px; left: 15px; color: #fff; font-size: 13px; font-weight: 600; }

        /* Categorias */
        .cat-bar { display: flex; overflow-x: auto; padding: 20px 15px; gap: 15px; scrollbar-width: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; min-width: 80px; border: none; background: none; cursor: pointer; }
        .cat-circle { width: 60px; height: 60px; background: #f8f8f8; border-radius: 50%; margin-bottom: 8px; border: 2px solid transparent; overflow: hidden; }
        .cat-circle img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card.active .cat-circle { border-color: var(--ifood-red); }
        .cat-name { font-size: 11px; font-weight: 700; color: var(--text-light); }

        /* Itens */
        .menu-item { padding: 20px 15px; border-bottom: 1px solid #f2f2f2; }
        .item-title { font-size: 16px; font-weight: 700; }
        .item-desc { font-size: 13px; color: var(--text-light); margin: 8px 0; }
        .size-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .size-btn { border: 1px solid #dcdcdc; background: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; }
        .size-btn.active { border-color: var(--ifood-red); color: var(--ifood-red); background: #fff5f5; }

        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: #2e7d32; font-weight: 700; }
        .qty-box { display: flex; align-items: center; gap: 12px; background: #f2f2f2; border-radius: 20px; padding: 5px 12px; }
        .btn-q { border: none; background: none; color: var(--ifood-red); font-size: 20px; font-weight: 700; cursor: pointer; }

        /* Modal de Contato */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 12px; padding: 24px; text-align: center; }
        .wa-option { display: block; background: #25d366; color: #fff; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: 700; margin-bottom: 10px; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-checkout { background: var(--ifood-red); color: #fff; border: none; padding: 14px 25px; border-radius: 6px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">Chris Gastronomia</div>

    <div class="banner-container">
        <div class="slider" id="slider">
            <div class="slide"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600"><div class="slide-txt">Marmitex: Sabor de Comida Caseira</div></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=600"><div class="slide-txt">Batatas Recheadas das 18h às 22h</div></div>
            <div class="slide"><img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=600"><div class="slide-txt">Av. Theodorico Cavalcante de Souza, 1305</div></div>
        </div>
    </div>

    <div class="cat-bar">
        <button class="cat-card active" onclick="filter('todos', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100"></div><div class="cat-name">INICIO</div></button>
        <button class="cat-card" onclick="filter('marmita', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=100"></div><div class="cat-name">MARMITEX</div></button>
        <button class="cat-card" onclick="filter('batata', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=100"></div><div class="cat-name">BATATAS</div></button>
    </div>

    <div id="lista"></div>

    <div id="waModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Escolha o WhatsApp</h3>
            <p style="font-size: 14px; color: var(--text-light); margin-bottom: 20px;">Selecione um dos números para enviar seu pedido:</p>
            <a href="#" id="wa1" class="wa-option" onclick="enviar('5512997136890')">WhatsApp 1 (Final 6890)</a>
            <a href="#" id="wa2" class="wa-option" style="background: #128c7e;" onclick="enviar('551298190-6835')">WhatsApp 2 (Final 6835)</a>
            <button onclick="fecharModal()" style="background:none; border:none; color:var(--text-light); margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="footer">
        <div><div style="font-size: 11px; color: var(--text-light);">Total</div><div style="font-size: 18px; font-weight: 700;">R$ <span id="total">0,00</span></div></div>
        <button class="btn-checkout" onclick="abrirModal()">Finalizar Pedido</button>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", desc: "Arroz, feijao, mistura, guarnicao, repolho e salada de chuchu.", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Strogonoff de Carne", desc: "Batata selecionada com recheio cremoso premium.", sizes: { "Padrao": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Frango Desfiado", desc: "Frango temperado com ervas e requeijao.", sizes: { "Padrao": 25.00 } },
            { id: 4, cat: 'batata', nome: "Batata Calabresa / Bacon", desc: "Recheio generoso de calabresa e bacon crocante.", sizes: { "Padrao": 25.00 } }
        ];

        let cart = [];
        let selection = {};

        function render(itens = produtos) {
            const container = document.getElementById('lista');
            container.innerHTML = itens.map(p => {
                const sizes = Object.keys(p.sizes);
                if (!selection[p.id]) selection[p.id] = sizes[0];
                const currentSize = selection[p.id];
                const itemCart = cart.find(i => i.id === p.id && i.size === currentSize) || {qtd: 0};

                return `
                    <div class="menu-item">
                        <div class="item-title">${p.nome}</div>
                        <div class="item-desc">${p.desc}</div>
                        <div class="size-box">
                            ${sizes.map(s => `<button class="size-btn ${s === currentSize ? 'active' : ''}" onclick="setSize(${p.id}, '${s}')">${s}</button>`).join('')}
                        </div>
                        <div class="item-footer">
                            <div class="price">R$ ${p.sizes[currentSize].toFixed(2).replace('.',',')}</div>
                            <div class="qty-box">
                                <button class="btn-q" onclick="update(${p.id}, -1)">-</button>
                                <span class="qty-val">${itemCart.qtd}</span>
                                <button class="btn-q" onclick="update(${p.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setSize(id, size) { selection[id] = size; render(); }

        function update(id, delta) {
            const size = selection[id];
            const p = produtos.find(x => x.id === id);
            const idx = cart.findIndex(i => i.id === id && i.size === size);
            if (idx > -1) {
                cart[idx].qtd += delta;
                if (cart[idx].qtd <= 0) cart.splice(idx, 1);
            } else if (delta > 0) {
                cart.push({ id, nome: p.nome, size, preco: p.sizes[size], qtd: 1 });
            }
            render();
            const total = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            document.getElementById('total').innerText = total.toFixed(2).replace('.',',');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'todos' ? produtos : produtos.filter(p => p.cat === cat));
        }

        function abrirModal() { if(cart.length) document.getElementById('waModal').style.display = 'flex'; else alert("Selecione um item."); }
        function fecharModal() { document.getElementById('waModal').style.display = 'none'; }

        function enviar(numero) {
            let msg = `*NOVO PEDIDO - CHRIS GASTRONOMIA*\n\n`;
            cart.forEach(i => msg += `• ${i.qtd}x ${i.nome} (${i.size})\n`);
            msg += `\n*TOTAL: R$ ${document.getElementById('total').innerText}*`;
            window.open(`https://wa.me/${numero.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
            fecharModal();
        }

        setInterval(() => {
            const s = document.getElementById('slider');
            const cur = (parseInt(s.dataset.cur || 0) + 1) % 3;
            s.style.transform = `translateX(-${cur * 33.33}%)`;
            s.dataset.cur = cur;
        }, 4000);

        render();
    </script>
</body>
</html>
