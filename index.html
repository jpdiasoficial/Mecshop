<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Sistema de Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #d91d2c; --text-main: #1a1a1a; --text-light: #666666; --bg-soft: #fcfcfc; --border-color: #eeeeee; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fff; color: var(--text-main); -webkit-font-smoothing: antialiased; }

        /* Header Minimalista */
        .app-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: space-between; }
        .logo-text { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; text-transform: uppercase; }

        /* Banner Slider Profissional */
        .hero-banner { width: 100%; height: 220px; overflow: hidden; position: relative; background: #111; }
        .slider-track { display: flex; width: 300%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); display: flex; align-items: flex-end; padding: 24px; }
        .slide-info h2 { color: #fff; margin: 0; font-size: 20px; font-weight: 600; }

        /* Categorias Clean */
        .cat-nav { display: flex; overflow-x: auto; padding: 24px; gap: 12px; scrollbar-width: none; background: var(--bg-soft); }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-pill { background: #fff; border: 1px solid var(--border-color); padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; color: var(--text-light); white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .cat-pill.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }

        /* Listagem de Itens */
        .menu-container { padding: 0 24px; }
        .menu-item { display: flex; padding: 24px 0; border-bottom: 1px solid var(--border-color); gap: 16px; }
        .item-details { flex: 1; }
        .item-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .item-desc { font-size: 13px; color: var(--text-light); line-height: 1.5; margin-bottom: 12px; }
        
        /* Seletor de Tamanho Profissional */
        .size-selector { display: flex; gap: 8px; margin-bottom: 16px; }
        .size-btn { border: 1px solid var(--border-color); background: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .size-btn.selected { border-color: var(--text-main); background: var(--text-main); color: #fff; }

        .price-tag { font-weight: 700; font-size: 15px; color: var(--text-main); }

        /* Controles de Quantidade */
        .qty-control { display: flex; align-items: center; background: var(--bg-soft); border-radius: 8px; padding: 4px; border: 1px solid var(--border-color); }
        .qty-btn { border: none; background: none; width: 32px; height: 32px; font-size: 18px; cursor: pointer; color: var(--brand-red); font-weight: 600; }
        .qty-val { width: 30px; text-align: center; font-size: 14px; font-weight: 700; }

        /* Rodapé de Finalização */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px 24px; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1000; }
        .total-info span { display: block; font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; }
        .total-info strong { font-size: 20px; font-weight: 700; }
        .checkout-btn { background: var(--brand-red); color: #fff; border: none; padding: 16px 32px; border-radius: 8px; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; cursor: pointer; }

        @media (max-width: 480px) { .menu-item { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-text">Chris Gastronomia</div>
        <div style="font-size: 11px; font-weight: 600; color: #2e7d32;">Aberto Agora</div>
    </header>

    <section class="hero-banner">
        <div class="slider-track" id="slider">
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=800" alt="Culinária Caseira">
                <div class="slide-overlay"><div class="slide-info"><h2>Culinária Autêntica</h2></div></div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=800" alt="Batatas Gourmet">
                <div class="slide-overlay"><div class="slide-info"><h2>Batatas Gourmet</h2></div></div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1563379091339-03b21bc4a4f8?w=800" alt="Ingredientes Selecionados">
                <div class="slide-overlay"><div class="slide-info"><h2>Qualidade Superior</h2></div></div>
            </div>
        </div>
    </section>

    <nav class="cat-nav">
        <button class="cat-pill active" onclick="filterMenu('todos', this)">Cardápio Completo</button>
        <button class="cat-pill" onclick="filterMenu('marmita', this)">Almoço Executivo</button>
        <button class="cat-pill" onclick="filterMenu('batata', this)">Batatas Recheadas</button>
        <button class="cat-pill" onclick="filterMenu('bebida', this)">Bebidas</button>
    </nav>

    <main class="menu-container" id="menu-list"></main>

    <footer class="cart-bar">
        <div class="total-info">
            <span>Subtotal</span>
            <strong id="cart-total">R$ 0,00</strong>
        </div>
        <button class="checkout-btn" onclick="checkout()">Finalizar Pedido</button>
    </footer>

    <script>
        const menuData = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", desc: "Arroz premium, feijão artesanal, guarnição do dia e proteína selecionada.", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Recheada Strogonoff", desc: "Batata selecionada, strogonoff de carne com creme de leite fresco e batata palha extra fina.", sizes: { "Padrão": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Recheada Frango", desc: "Frango desfiado temperado com ervas finas e requeijão cremoso.", sizes: { "Padrão": 25.00 } },
            { id: 4, cat: 'bebida', nome: "Suco Natural de Laranja", desc: "Extraído na hora, sem conservantes. 500ml.", sizes: { "Copo": 8.00 } }
        ];

        let cart = [];

        function renderMenu(items = menuData) {
            const container = document.getElementById('menu-list');
            container.innerHTML = items.map(item => {
                const sizes = Object.keys(item.sizes);
                const selectedSize = sizes[0];
                const itemInCart = cart.find(c => c.id === item.id && c.size === selectedSize) || {qtd: 0};

                return `
                    <div class="menu-item">
                        <div class="item-details">
                            <div class="item-name">${item.nome}</div>
                            <div class="item-desc">${item.desc}</div>
                            
                            <div class="size-selector" id="size-container-${item.id}">
                                ${sizes.map((s, idx) => `
                                    <button class="size-btn ${idx === 0 ? 'selected' : ''}" 
                                            onclick="selectSize(${item.id}, '${s}', ${item.sizes[s]}, this)">
                                        ${s}
                                    </button>
                                `).join('')}
                            </div>

                            <div class="price-tag" id="price-${item.id}">R$ ${item.sizes[selectedSize].toFixed(2).replace('.',',')}</div>
                        </div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
                            <span class="qty-val" id="qty-${item.id}">0</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let selectedSizes = {}; 
        menuData.forEach(p => selectedSizes[p.id] = { size: Object.keys(p.sizes)[0], price: p.sizes[Object.keys(p.sizes)[0]] });

        function selectSize(id, size, price, btn) {
            const container = document.getElementById(`size-container-${id}`);
            container.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            selectedSizes[id] = { size, price };
            document.getElementById(`price-${id}`).innerText = `R$ ${price.toFixed(2).replace('.',',')}`;
            
            // Atualiza a quantidade exibida baseada no tamanho selecionado
            const itemInCart = cart.find(c => c.id === id && c.size === size);
            document.getElementById(`qty-${id}`).innerText = itemInCart ? itemInCart.qtd : 0;
        }

        function updateQty(id, delta) {
            const selection = selectedSizes[id];
            const idx = cart.findIndex(c => c.id === id && c.size === selection.size);

            if (idx > -1) {
                cart[idx].qtd += delta;
                if (cart[idx].qtd <= 0) cart.splice(idx, 1);
            } else if (delta > 0) {
                const item = menuData.find(m => m.id === id);
                cart.push({ id, nome: item.nome, size: selection.size, price: selection.price, qtd: 1 });
            }

            const itemInCart = cart.find(c => c.id === id && c.size === selection.size);
            document.getElementById(`qty-${id}`).innerText = itemInCart ? itemInCart.qtd : 0;
            updateTotal();
        }

        function updateTotal() {
            const total = cart.reduce((acc, i) => acc + (i.price * i.qtd), 0);
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'todos' ? menuData : menuData.filter(m => m.cat === cat);
            renderMenu(filtered);
        }

        function checkout() {
            if (!cart.length) return alert("Por favor, selecione ao menos um item.");
            let message = `*SOLICITAÇÃO DE PEDIDO - CHRIS GASTRONOMIA*\n\n`;
            cart.forEach(i => message += `• ${i.qtd}x ${i.nome} (${i.size}) - R$ ${(i.price * i.qtd).toFixed(2)}\n`);
            message += `\n*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            
            window.open(`https://wa.me/5512997136890?text=${encodeURIComponent(message)}`);
        }

        // Slider Logic
        let cur = 0;
        setInterval(() => {
            cur = (cur + 1) % 3;
            document.getElementById('slider').style.transform = `translateX(-${cur * 33.33}%)`;
        }, 5000);

        renderMenu();
    </script>
</body>
</html>
