<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE SYSTEM | LOGIN UNIFICADO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #091e42; --bg: #f4f5f7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; color: var(--dark); margin-bottom: 30px; }
        .logo span { color: var(--primary); }
        
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dfe1e6; border-radius: 6px; outline: none; font-size: 14px; }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #0747a6; }
        
        .role-info { font-size: 12px; color: #6b778c; margin-top: 20px; text-align: left; background: #f4f5f7; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">ELITE<span>ENTERPRISE</span></div>
        <p style="color: #6b778c; margin-bottom: 25px;">Acesse sua estação de trabalho</p>
        
        <form id="loginForm">
            <select id="userRole" required>
                <option value="" disabled selected>Selecione seu Cargo</option>
                <option value="admin">Gestor Master (Torre de Controle)</option>
                <option value="operador">Operador de Doca (Bipagem)</option>
                <option value="motorista">Motorista (Rotas/Last Mile)</option>
                <option value="rh">Recursos Humanos (Performance)</option>
            </select>
            
            <input type="text" placeholder="Matrícula ou Usuário" required>
            <input type="password" placeholder="Senha de Acesso" required>
            
            <button type="submit" class="btn-login">ACESSAR SISTEMA</button>
        </form>

        <div class="role-info" id="info">
            <i class="fa-solid fa-circle-info"></i> Selecione um cargo para ver suas permissões.
        </div>
    </div>

    <script>
        const roleSelect = document.getElementById('userRole');
        const infoBox = document.getElementById('info');

        const permissions = {
            admin: "Acesso total: Financeiro, Frota, RH e Dashboards de Atraso.",
            operador: "Acesso restrito: Terminal de Bipagem e Conferência de Carga.",
            motorista: "Acesso mobile: GPS, Ordem de Entrega e Assinatura Digital.",
            rh: "Acesso administrativo: Folha de Ponto e Score de Produtividade."
        };

        roleSelect.addEventListener('change', () => {
            infoBox.innerHTML = `<i class="fa-solid fa-shield-halved"></i> <b>Nível:</b> ${permissions[roleSelect.value]}`;
        });

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const role = roleSelect.value;
            alert(`Redirecionando para o Painel de ${role.toUpperCase()}... \n(Aqui o sistema carrega o módulo específico que criamos nas mensagens anteriores)`);
            // Lógica Real: window.location.href = `dashboard_${role}.html`;
        };
    </script>
</body>
</html>
