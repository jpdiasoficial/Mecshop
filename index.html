<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC SHOP | OFERTAS</title>
    <style>
        :root { --accent: #00f2ff; --price-tag: #2ecc71; --discount: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 230px; }
        
        header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        .logo { color: #fff; font-weight: bold; font-size: 20px; letter-spacing: 1px; }

        /* Banner */
        .banner { width: 100%; background: #000; }
        .banner img { width: 100%; max-width: 600px; display: block; margin: 0 auto; }

        /* Container de Produtos */
        .container { display: flex; justify-content: center; gap: 12px; padding: 15px; flex-wrap: wrap; }
        
        .product-card { 
            background: #fff; border-radius: 12px; width: 160px; padding: 10px; 
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative;
        }

        /* Etiqueta de Desconto */
        .off-badge { 
            position: absolute; top: 5px; left: 5px; background: var(--discount); 
            color: #fff; font-size: 10px; font-weight: bold; padding: 3px 6px; border-radius: 4px; 
        }

        .product-card img { width: 100%; border-radius: 8px; }
        .product-card h3 { font-size: 13px; margin: 8px 0; color: #444; height: 32px; overflow: hidden; }
        
        /* PREÇOS */
        .price-old { text-decoration: line-through; color: #888; font-size: 11px; margin: 0; }
        .price-new { color: #000; font-size: 20px; font-weight: 800; margin: 2px 0; }
        .installments { color: var(--price-tag); font-size: 11px; font-weight: bold; margin-bottom: 8px; }

        /* Controles */
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 8px; }
        .qty-btn { border: 1px solid #ddd; background: #f8f8f8; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; }
        
        .btn-add { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* CARRINHO FIXO PROFISSIONAL */
        .cart-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); border-radius: 20px 20px 0 0; z-index: 1000; }
        .cart-info { padding: 8px 15px; text-align: center; font-size: 12px; border-bottom: 1px solid #eee; background: #fafafa; border-radius: 20px 20px 0 0; }
        #cart-list { color: #00a8e8; font-weight: bold; }

        .cart-main { display: flex; justify-content: space-between; align-items: center; padding: 15px; gap: 10px; }
        .btn-clear { background: #eee; border: none; padding: 15px; border-radius: 10px; cursor: pointer; }
        .btn-finish { background: var(--price-tag); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; flex-grow: 1; font-size: 16px; cursor: pointer; }

        .footer-pay { text-align: center; padding-bottom: 10px; }
        .footer-pay img { width: 120px; opacity: 0.5; }
    </style>
</head>
<body>

    <header><div class="logo">MEC SHOP</div></header>

    <div class="banner">
        <img src="https://via.placeholder.com/600x300/000/00f2ff?text=OFERTAS+COM+ATÉ+70%+OFF" alt="Banner">
    </div>

    <div class="container">
        <div class="product-card">
            <div class="off-badge">45% OFF</div>
            <img src="https://via.placeholder.com/150/000/fff?text=Tênis" alt="P1">
            <h3>Tênis Ultra Sport 2026</h3>
            <p class="price-old">R$ 349,90</p>
            <p class="price-new">R$ 187,00</p>
            <p class="installments">Pix ou 12x no cartão</p>
            <div class="qty-box">
                <button class="qty-btn" onclick="change('q1', -1)">-</button>
                <span id="q1" style="font-weight:bold">1</span>
                <button class="qty-btn" onclick="change('q1', 1)">+</button>
            </div>
            <button class="btn-add" onclick="add('Tênis Ultra Sport', 187, 'q1')">ADICIONAR AO CARRINHO</button>
        </div>

        <div class="product-card">
            <div class="off-badge">60% OFF</div>
            <img src="https://via.placeholder.com/150/000/fff?text=Fone" alt="P2">
            <h3>Fone Bluetooth Noise Cancelling</h3>
            <p class="price-old">R$ 199,00</p>
            <p class="price-new">R$ 79,90</p>
            <p class="installments">Pix ou 12x no cartão</p>
            <div class="qty-box">
                <button class="qty-btn" onclick="change('q2', -1)">-</button>
                <span id="q2" style="font-weight:bold">1</span>
                <button class="qty-btn" onclick="change('q2', 1)">+</button>
            </div>
            <button class="btn-add" onclick="add('Fone Bluetooth', 79.9, 'q2')">ADICIONAR AO CARRINHO</button>
        </div>
    </div>

    <div class="cart-wrapper">
        <div class="cart-info">🛒 <span id="cart-list">Seu carrinho está vazio</span></div>
        <div class="cart-main">
            <button class="btn-clear" onclick="reset()">🗑️</button>
            <button class="btn-finish" onclick="checkout()">FINALIZAR COMPRA • R$ <span id="total">0,00</span></button>
        </div>
        <div class="footer-pay">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo%E2%80%94pix.png/1200px-Logo%E2%80%94pix.png" alt="Pix">
        </div>
    </div>

    <script>
        let cart = {};
        function change(id, v) {
            let e = document.getElementById(id);
            let n = parseInt(e.innerText) + v;
            if(n >= 1) e.innerText = n;
        }
        function add(n, p, id) {
            let q = parseInt(document.getElementById(id).innerText);
            if(cart[n]) cart[n].q += q;
            else cart[n] = { q: q, p: p };
            document.getElementById(id).innerText = "1";
            upd();
        }
        function reset() { cart = {}; upd(); }
        function upd() {
            let t = 0; let s = "";
            for(let i in cart) {
                t += cart[i].q * cart[i].p;
                s += `${i} (x${cart[i].q}) | `;
            }
            document.getElementById('total').innerText = t.toFixed(2).replace('.', ',');
            document.getElementById('cart-list').innerText = s || "Seu carrinho está vazio";
        }
        function checkout() {
            if(Object.keys(cart).length === 0) return alert("Adicione itens!");
            let m = "*NOVO PEDIDO - MEC SHOP*\n\n";
            for(let i in cart) m += `🔹 ${i} - Qtd: ${cart[i].q}\n`;
            m += `\n*TOTAL: R$ ${document.getElementById('total').innerText}*`;
            window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
