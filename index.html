<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTE EM TEMPO REAL | JP DIAS V60</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .box-teste { border: 2px solid #f39c12; border-radius: 15px; padding: 20px; background: #1a1a1a; max-width: 400px; margin: auto; }
        .btn-teste { background: #f39c12; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; font-size: 16px; }
        .btn-avaria { background: #e74c3c; color: white; }
        .painel-gestor { margin-top: 20px; background: #222; padding: 10px; border-radius: 8px; font-size: 12px; text-align: left; border-left: 5px solid #2ecc71; }
        .log-linha { border-bottom: 1px solid #333; padding: 5px; color: #2ecc71; font-family: monospace; }
    </style>
</head>
<body>

    <div class="box-teste">
        <h2 style="color:#f39c12">JP DIAS LOG</h2>
        <p>Simulação de Operação Real</p>
        
        <button class="btn-teste" onclick="testeArmazem()">1. TESTAR ARMAZÉM (VOZ)</button>
        <button class="btn-teste" onclick="testeCrossDock()">2. TESTAR CROSS DOCK</button>
        <button class="btn-teste btn-avaria" onclick="testeAvaria()">3. TESTAR AVARIA (TRAVA)</button>

        <div class="painel-gestor">
            <strong>🛰️ TORRE DE CONTROLE (LOGS):</strong>
            <div id="log-espaco">
                <div class="log-linha">[18:23] Sistema V60 Pronto...</div>
            </div>
        </div>
    </div>

    <script>
        const falar = (t) => {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        };

        function registrar(msg) {
            const log = document.getElementById('log-espaco');
            const hora = new Date().toLocaleTimeString();
            log.innerHTML = `<div class="log-linha">[${hora}] ${msg}</div>` + log.innerHTML;
        }

        // TESTE 01: ARMAZÉM + TRAVA 3 DÍGITOS
        function testeArmazem() {
            falar("Iniciando teste de Armazém. Vá para a Rua B e separe Alcatra. O código final é 789.");
            setTimeout(() => {
                let bip = prompt("DIGITE OS 3 ÚLTIMOS DÍGITOS DO PRODUTO (Dica: 789):");
                if(bip === "789") {
                    falar("Bipe confirmado. Item enviado para conferência.");
                    registrar("ARMAZÉM: Separação concluída com sucesso.");
                } else {
                    falar("Erro de separação! O código não confere.");
                    registrar("ERRO: Tentativa de separação incorreta.");
                }
            }, 500);
        }

        // TESTE 02: CROSS DOCK + CORTE
        function testeCrossDock() {
            falar("Alerta de Cross Dock. Rota Campinas entra em horário de corte em 5 minutos. Priorize o carregamento.");
            registrar("CROSSDOCK: Alerta de Cut-off disparado para Rota Campinas.");
            alert("⚠️ ALERTA: Rota fecha em breve!");
        }

        // TESTE 03: AVARIA + HIERARQUIA
        function testeAvaria() {
            falar("Avaria detectada. Item bloqueado. Somente o Gestor pode autorizar.");
            let senha = prompt("SENHA DO GESTOR PARA BAIXA:");
            if(senha === "123") {
                falar("Acesso autorizado. Baixa de avaria registrada no histórico.");
                registrar("AUDITORIA: Gestor autorizou descarte de item.");
            } else {
                falar("Senha incorreta. O item permanece travado no estoque.");
                registrar("BLOQUEIO: Tentativa de baixa sem autorização.");
            }
        }
    </script>
</body>
</html>
