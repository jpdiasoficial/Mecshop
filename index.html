<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATÁLOGO SERGEL | ALLAN GELADOS</title>
    <style>
        :root { --primary: #25d366; --dark: #121212; --accent: #ff4757; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f9f9f9; color: var(--dark); padding-bottom: 110px; }
        
        .header { background: #000; color: #fff; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; font-size: 12px; color: #ccc; }

        .search-area { padding: 15px; position: sticky; top: 0; background: #f9f9f9; z-index: 100; }
        .search-box { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 8px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 16px; }

        .categoria-label { padding: 15px 15px 5px; font-weight: 800; font-size: 14px; color: #666; text-transform: uppercase; }

        .lista-produtos { padding: 0 15px; }
        .item { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 12px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .info { flex: 1; padding-right: 10px; }
        .nome { font-weight: 700; font-size: 15px; display: block; margin-bottom: 4px; }
        .desc { font-size: 12px; color: #777; line-height: 1.3; }
        .precos { margin-top: 8px; display: block; }
        .v-price { font-weight: 800; color: #000; font-size: 14px; }
        .a-price { font-size: 11px; color: #2ecc71; font-weight: 600; margin-left: 5px; }

        .controls { text-align: right; min-width: 100px; }
        .btn-add { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 700; cursor: pointer; }
        .qty-ctrl { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .btn-q { width: 30px; height: 30px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-weight: bold; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 200; }
        .total-box span { display: block; }
        .btn-zap { background: var(--primary); color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; font-size: 14px; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; z-index:300; align-items:center; justify-content:center; }
        .modal-body { background:#fff; width:90%; border-radius:15px; padding:20px; box-sizing:border-box; }
        .input { width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:5px; box-sizing:border-box; }
    </style>
</head>
<body>

<div class="header">
    <h1>ALLAN GELADOS - SERGEL</h1>
    <p>O VERDADEIRO SABOR DA FELICIDADE</p>
</div>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="busca" oninput="render()" placeholder="🔍 Buscar sabor ou categoria...">
    </div>
</div>

<div id="conteudo"></div>

<div class="footer">
    <div class="total-box">
        <span style="font-size: 10px; color: #888;">SUBTOTAL</span>
        <span style="font-size: 18px; font-weight: 900;">R$ <span id="resumo-total">0,00</span></span>
    </div>
    <button class="btn-zap" onclick="abrirModal()">FECHAR PEDIDO</button>
</div>

<div class="modal" id="modal">
    <div class="modal-body">
        <h3 style="margin-top:0">Dados para Entrega</h3>
        <div id="resumo-itens" style="font-size: 12px; color: #666; margin-bottom: 10px; max-height: 80px; overflow-y: auto;"></div>
        <input type="text" id="cliente" class="input" placeholder="Seu Nome">
        <input type="text" id="rua" class="input" placeholder="Endereço Completo">
        <button class="btn-zap" style="width:100%" onclick="enviarZap()">ENVIAR NO WHATSAPP</button>
        <button onclick="fecharModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#999; font-size:12px;">Voltar</button>
    </div>
</div>

<script>
    const produtos = [
        { id: 1, cat: 'Potes 2 Litros', nome: 'Leitinho Trufado', desc: 'O campeão de vendas. Sorvete de leite com trufas de chocolate artesanal.', preco: 45.0, atacado: 38.0, min: 10 },
        { id: 2, cat: 'Potes 2 Litros', nome: 'Delicielo Avelã', desc: 'Sabor irresistível de avelã cremosa com pedaços.', preco: 45.0, atacado: 38.0, min: 10 },
        { id: 3, cat: 'Potes 2 Litros', nome: 'Iogurte com Amarena', desc: 'Toque azedinho do iogurte com a doçura da cereja silvestre amarena.', preco: 45.0, atacado: 38.0, min: 10 },
        { id: 4, cat: 'Potes 2 Litros', nome: 'Chocolate Belga', desc: 'Intenso, cremoso e feito com o puro cacau selecionado.', preco: 45.0, atacado: 38.0, min: 10 },
        { id: 5, cat: 'Potes 2 Litros', nome: 'Napolitano Especial', desc: 'Três cores, três sabores: Morango, Creme e Chocolate Clássico.', preco: 40.0, atacado: 35.0, min: 10 },
        
        { id: 6, cat: 'Picolés (Especiais)', nome: 'Skimo Clássico', desc: 'Sorvete de baunilha com casquinha crocante de chocolate meio amargo.', preco: 7.0, atacado: 2.8, min: 20 },
        { id: 7, cat: 'Picolés (Especiais)', nome: 'Chocolate Holandês', desc: 'Cremosidade extrema com chocolate tipo exportação no palito.', preco: 7.0, atacado: 2.8, min: 20 },
        { id: 8, cat: 'Picolés (Especiais)', nome: 'Pavê de Chocolate', desc: 'Inspirado na sobremesa brasileira, com pedaços de biscoito.', preco: 7.0, atacado: 2.8, min: 20 },
        
        { id: 9, cat: 'Picolés (Frutas)', nome: 'Milho Verde', desc: 'O sabor da roça. Feito com milho selecionado e muito leite.', preco: 6.0, atacado: 2.2, min: 20 },
        { id: 10, cat: 'Picolés (Frutas)', nome: 'Morango com Leite Cond.', desc: 'Recheado com leite condensado cremoso.', preco: 7.0, atacado: 2.8, min: 20 },
        { id: 11, cat: 'Picolés (Frutas)', nome: 'Limão Siciliano', desc: 'Refrescante, cítrico e natural. Ideal para dias quentes.', preco: 5.0, atacado: 2.0, min: 20 }
    ];

    let carrinho = [];

    function render() {
        const container = document.getElementById('conteudo');
        const busca = document.getElementById('busca').value.toLowerCase();
        container.innerHTML = '';

        let categorias = [...new Set(produtos.map(p => p.cat))];

        categorias.forEach(cat => {
            const itensFiltrados = produtos.filter(p => p.cat === cat && p.nome.toLowerCase().includes(busca));
            
            if(itensFiltrados.length > 0) {
                container.innerHTML += `<div class="categoria-label">${cat}</div><div class="lista-produtos">`;
                itensFiltrados.forEach(p => {
                    const itemNoCart = carrinho.find(c => c.id === p.id);
                    container.innerHTML += `
                        <div class="item">
                            <div class="info">
                                <span class="nome">${p.nome}</span>
                                <span class="desc">${p.desc}</span>
                                <span class="precos">
                                    <span class="v-price">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                                    <span class="a-price">Atacado: R$ ${p.atacado.toFixed(2).replace('.',',')}</span>
                                </span>
                            </div>
                            <div class="controls">
                                ${itemNoCart ? `
                                    <div class="qty-ctrl">
                                        <button class="btn-q" onclick="updateQty(${p.id}, -1)">-</button>
                                        <strong>${itemNoCart.qtd}</strong>
                                        <button class="btn-q" onclick="updateQty(${p.id}, 1)">+</button>
                                    </div>
                                ` : `<button class="btn-add" onclick="updateQty(${p.id}, 1)">ADD</button>`}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML += `</div>`;
            }
        });
        calcTotal();
    }

    function updateQty(id, d) {
        const idx = carrinho.findIndex(c => c.id === id);
        if(idx > -1) {
            carrinho[idx].qtd += d;
            if(carrinho[idx].qtd <= 0) carrinho.splice(idx, 1);
        } else {
            carrinho.push({...produtos.find(p => p.id === id), qtd: 1});
        }
        render();
    }

    function calcTotal() {
        let total = 0;
        carrinho.forEach(i => {
            const p = i.qtd >= i.min ? i.atacado : i.preco;
            total += p * i.qtd;
        });
        document.getElementById('resumo-total').innerText = total.toFixed(2).replace('.',',');
    }

    function abrirModal() {
        if(carrinho.length === 0) return alert("Adicione itens primeiro!");
        document.getElementById('resumo-itens').innerHTML = carrinho.map(i => `${i.qtd}x ${i.nome}`).join(', ');
        document.getElementById('modal').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    function enviarZap() {
        const nome = document.getElementById('cliente').value;
        const end = document.getElementById('rua').value;
        if(!nome || !end) return alert("Preencha os campos!");

        let msg = `*PEDIDO ALLAN GELADOS*\n\n*Cliente:* ${nome}\n*Endereço:* ${end}\n\n*ITENS:*\n`;
        carrinho.forEach(i => {
            const p = i.qtd >= i.min ? i.atacado : i.preco;
            msg += `• ${i.qtd}x ${i.nome} - R$ ${(p * i.qtd).toFixed(2)}${i.qtd >= i.min ? ' (ATACADO)' : ''}\n`;
        });
        msg += `\n*TOTAL: R$ ${document.getElementById('resumo-total').innerText}*`;
        
        window.open(`https://wa.me/5519996912728?text=${encodeURIComponent(msg)}`);
    }

    render();
</script>
</body>
</html>
