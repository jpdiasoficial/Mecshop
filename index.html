<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÓ GELADOS | CATALOGO INTERATIVO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --success: #25d366; --bg: #f8f9fa; --text: #1a1a1a; --danger: #ff4757; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 110px; }
        
        /* Banner de Elite */
        .header-banner { width: 100%; height: 180px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=800'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .header-banner h1 { font-weight: 800; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

        /* Busca e Categorias */
        .nav-container { padding: 0 20px; margin-top: -25px; }
        .search-box { background: #fff; display: flex; padding: 12px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 16px; font-family: 'Inter'; }
        
        .cat-bar { display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; scrollbar-width: none; }
        .cat-btn { background: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1px solid #ddd; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Grid de Produtos - Estilo MEC SHOP */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { background: #fff; border-radius: 16px; padding: 12px; border: 1px solid #eee; display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .card:active { transform: scale(0.98); }
        .card.esgotado { opacity: 0.6; filter: grayscale(1); }
        .badge-atacado { position: absolute; top: 8px; left: 8px; background: #2ecc71; color: #fff; font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: 800; z-index: 5; }
        
        .img-prod { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        .name-prod { font-size: 13px; font-weight: 700; height: 34px; margin-bottom: 5px; line-height: 1.2; }
        .price-prod { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        
        /* Botões */
        .btn-add { background: var(--text); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; }
        .qty-box { display: flex; align-items: center; justify-content: space-between; background: #f1f3f5; border-radius: 10px; padding: 5px; }
        .btn-qty { background: #fff; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: 800; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Footer Carrinho */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .total-info { display: flex; flex-direction: column; }
        .total-label { font-size: 11px; color: #888; font-weight: 700; }
        .total-price { font-size: 20px; font-weight: 800; color: var(--text); }
        .btn-finalizar { background: var(--success); color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; }

        /* Modal Checkout */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 200; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .input-form { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; font-family: 'Inter'; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>SÓ GELADOS<br><small style="font-size: 12px;">Qualidade em cada colherada</small></h1>
    </div>

    <div class="nav-container">
        <div class="search-box">
            <input type="text" id="busca" oninput="render()" placeholder="O que você deseja hoje?">
        </div>
    </div>

    <div class="cat-bar">
        <div class="cat-btn active" onclick="filtrar('Tudo', this)">Tudo</div>
        <div class="cat-btn" onclick="filtrar('Potes 2L', this)">Potes 2L</div>
        <div class="cat-btn" onclick="filtrar('Potes 1L', this)">Potes 1L</div>
        <div class="cat-btn" onclick="filtrar('Picolés', this)">Picolés</div>
    </div>

    <div id="grid" class="grid"></div>

    <div class="footer">
        <div class="total-info">
            <span class="total-label">VALOR TOTAL</span>
            <span class="total-price">R$ <span id="total-val">0,00</span></span>
        </div>
        <button class="btn-finalizar" onclick="abrirModal()">FINALIZAR</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">Finalizar Pedido</h2>
            <div id="lista-resumo" style="margin-bottom: 20px; font-size: 14px; color: #555;"></div>
            <input type="text" id="nome" class="input-form" placeholder="Seu Nome Completo">
            <input type="text" id="endereco" class="input-form" placeholder="Endereço (Rua, Número, Bairro)">
            <button class="btn-finalizar" style="width: 100%; padding: 18px;" onclick="enviarZap()">PEDIR NO WHATSAPP</button>
            <button onclick="fecharModal()" style="width: 100%; border: none; background: none; color: #aaa; margin-top: 15px; font-weight: 600;">Voltar</button>
        </div>
    </div>

    <script>
        // DADOS REAIS EXTRAÍDOS DAS IMAGENS DA LOJA
        const produtos = [
            { id: 1, cat: "Potes 2L", nome: "Leitinho Trufado (2 Litros)", preco: 45.00, atacado: 38.00, min: 10, status: "DISPONÍVEL", img: "https://images.unsplash.com/photo-1501443762994-82bd5dabb892?w=400" },
            { id: 2, cat: "Potes 2L", nome: "Ferrero Rocher (2 Litros)", preco: 48.00, atacado: 42.00, min: 10, status: "DISPONÍVEL", img: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400" },
            { id: 3, cat: "Potes 1L", nome: "Ninho c/ Morango (1 Litro)", preco: 28.00, atacado: 24.00, min: 10, status: "DISPONÍVEL", img: "https://images.unsplash.com/photo-1579954115545-a95591f28bfc?w=400" },
            { id: 4, cat: "Picolés", nome: "Skimo Clássico", preco: 7.00, atacado: 2.80, min: 20, status: "DISPONÍVEL", img: "https://images.unsplash.com/photo-1505394033323-424ebb43ef2e?w=400" },
            { id: 5, cat: "Picolés", nome: "Fruta (Morango/Limão)", preco: 5.00, atacado: 2.20, min: 20, status: "DISPONÍVEL", img: "https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=400" },
            { id: 6, cat: "Potes 2L", nome: "Napolitano Tradicional", preco: 38.00, atacado: 32.00, min: 10, status: "ESGOTADO", img: "https://images.unsplash.com/photo-1560008581-09826d1de69e?w=400" }
        ];

        let cart = [];
        let filtroAtivo = "Tudo";

        function render() {
            const grid = document.getElementById('grid');
            const busca = document.getElementById('busca').value.toLowerCase();
            grid.innerHTML = "";

            produtos.filter(p => (filtroAtivo === "Tudo" || p.cat === filtroAtivo) && p.nome.toLowerCase().includes(busca))
            .forEach(p => {
                const item = cart.find(c => c.id === p.id);
                const esgotado = p.status === "ESGOTADO";
                grid.innerHTML += `
                    <div class="card ${esgotado ? 'esgotado' : ''}">
                        <span class="badge-atacado">ATACADO: R$ ${p.atacado.toFixed(2)}</span>
                        <img src="${p.img}" class="img-prod">
                        <span class="name-prod">${p.nome}</span>
                        <span class="price-prod">R$ ${p.preco.toFixed(2)}</span>
                        ${esgotado ? '<button class="btn-add" disabled>ESGOTADO</button>' : 
                        (item ? `
                            <div class="qty-box">
                                <button class="btn-qty" onclick="updateQty(${p.id}, -1)">-</button>
                                <strong>${item.qtd}</strong>
                                <button class="btn-qty" onclick="updateQty(${p.id}, 1)">+</button>
                            </div>
                        ` : `<button class="btn-add" onclick="updateQty(${p.id}, 1)">ADICIONAR</button>`)}
                    </div>
                `;
            });
            calcTotal();
        }

        function updateQty(id, delta) {
            const idx = cart.findIndex(c => c.id === id);
            if (idx > -1) {
                cart[idx].qtd += delta;
                if (cart[idx].qtd <= 0) cart.splice(idx, 1);
            } else {
                cart.push({...produtos.find(p => p.id === id), qtd: 1});
            }
            render();
        }

        function calcTotal() {
            let total = cart.reduce((acc, i) => {
                // Lógica de Atacado do Allan: Se atingir o mínimo, muda o preço
                const precoUnit = i.qtd >= i.min ? i.atacado : i.preco;
                return acc + (precoUnit * i.qtd);
            }, 0);
            document.getElementById('total-val').innerText = total.toFixed(2).replace('.',',');
        }

        function filtrar(cat, btn) {
            filtroAtivo = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function abrirModal() { 
            if(cart.length === 0) return alert("Seu carrinho está vazio!");
            document.getElementById('modal').style.display = 'flex'; 
            const resumo = document.getElementById('lista-resumo');
            resumo.innerHTML = cart.map(i => `• ${i.qtd}x ${i.nome} ${i.qtd >= i.min ? '(Preço Atacado)' : ''}`).join('<br>');
        }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        function enviarZap() {
            const nome = document.getElementById('nome').value;
            const end = document.getElementById('endereco').value;
            if(!nome || !end) return alert("Preencha seus dados!");

            let texto = `*NOVO PEDIDO - SÓ GELADOS*\n\n*NOME:* ${nome}\n*END:* ${end}\n\n*ITENS:*\n`;
            cart.forEach(i => {
                const pUnit = i.qtd >= i.min ? i.atacado : i.preco;
                texto += `• ${i.qtd}x ${i.nome} (R$ ${pUnit.toFixed(2)} un)\n`;
            });
            texto += `\n*TOTAL: R$ ${document.getElementById('total-val').innerText}*`;
            
            // SUBSTITUA PELO NÚMERO DO ALLAN
            window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(texto)}`);
        }

        render();
    </script>
</body>
    </html>
