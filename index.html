<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC SHOP | OFERTAS</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --btn-green: #2ecc71;
            --discount-red: #ff4757;
            --bg-light: #f1f3f6;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-light); padding-bottom: 120px; overflow-x: hidden; }

        /* SLIDER PROFISSIONAL (Igual à imagem) */
        .slider-container { width: 100%; height: 250px; overflow: hidden; position: relative; background: #000; }
        .slider-track { display: flex; width: 300%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { width: 100vw; height: 100%; position: relative; flex-shrink: 0; }
        .slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .slide-text { position: absolute; top: 50%; left: 20px; transform: translateY(-50%); color: white; z-index: 5; }
        .slide-text h2 { margin: 0; font-size: 26px; text-transform: uppercase; font-weight: 900; }
        .slide-text h2 span { color: var(--neon-blue); display: block; }
        .slide-btn { margin-top: 10px; background: var(--neon-blue); color: #000; padding: 8px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; border: none; text-transform: uppercase; }

        /* BUSCA */
        .search-area { padding: 0 15px; margin-top: -25px; position: relative; z-index: 100; }
        .search-box { background: #fff; display: flex; align-items: center; padding: 12px 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 14px; }

        /* VITRINE */
        .loja-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 25px 15px; }
        .produto-card { background: #fff; border-radius: 15px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        .off-badge { position: absolute; top: 8px; left: 8px; background: var(--discount-red); color: #fff; font-size: 9px; font-weight: bold; padding: 3px 7px; border-radius: 5px; z-index: 2; }
        .img-produto { width: 100%; height: 130px; object-fit: contain; margin-bottom: 8px; }
        .nome { font-size: 13px; font-weight: 700; color: #333; text-align: left; height: 35px; overflow: hidden; display: block; }
        .preco { font-size: 17px; font-weight: 900; color: #000; display: block; text-align: left; margin: 8px 0; }
        .btn-add { background: #000; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; }

        /* BARRA FIXA */
        .footer-cart { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; border-radius: 20px 20px 0 0; }
        .btn-ver { background: #004d40; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        .modal-body { position: absolute; bottom: 0; background: #fff; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .controles { display: flex; align-items: center; gap: 10px; }
        .btn-q { background: #000; color: #fff; border: none; width: 30px; height: 30px; border-radius: 8px; font-weight: bold; }
        
        .input-checkout { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slider-track" id="slider">
            <div class="slide">
                <div class="slide-text"><h2>LOJA MEC SHOP <span>ACHADOS!</span></h2><button class="slide-btn">Ver Ofertas</button></div>
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800">
            </div>
            <div class="slide">
                <div class="slide-text"><h2>ESTILO <span>& PERFORMANCE</span></h2><button class="slide-btn">Confira</button></div>
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800">
            </div>
            <div class="slide">
                <div class="slide-text"><h2>TECNOLOGIA <span>DE PONTA!</span></h2><button class="slide-btn">Aproveitar</button></div>
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800">
            </div>
        </div>
    </div>

    <div class="search-area">
        <div class="search-box">🔍 <input type="text" placeholder="O que você procura?"></div>
    </div>

    <div id="vitrine" class="loja-grid"></div>

    <div class="footer-cart">
        <div>Total: <br><b>R$ <span id="total-val">0,00</span></b></div>
        <button class="btn-ver" onclick="toggleModal(true)">VER PEDIDO</button>
    </div>

    <div class="modal" id="modalCart">
        <div class="modal-body">
            <h3 style="margin-top:0">Finalizar Pedido</h3>
            <div id="cartItemsList"></div>
            
            <div style="margin-top:20px;">
                <input type="text" id="nomeCliente" class="input-checkout" placeholder="Seu Nome Completo">
                <input type="text" id="endCliente" class="input-checkout" placeholder="Endereço de Entrega (Rua, Nº, Bairro)">
            </div>

            <button class="btn-ver" style="width:100%; padding:18px; margin-top:10px; font-size:16px;" onclick="enviarZap()">FINALIZAR NO WHATSAPP</button>
            <button onclick="toggleModal(false)" style="width:100%; background:none; border:none; color:#999; margin-top:15px; font-weight:bold;">Voltar para a loja</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, off: "40% OFF", nome: "Smartwatch Ultra Series 9", preco: 289.90, img: "https://m.media-amazon.com/images/I/71Yp-H-O8rL._AC_SL1500_.jpg" },
            { id: 2, off: "30% OFF", nome: "Headset Gamer Pro", preco: 159.00, img: "https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg" },
            { id: 3, off: "50% OFF", nome: "Tênis Esportivo Nitro", preco: 197.00, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" },
            { id: 4, off: "25% OFF", nome: "Caixa de Som Bass+", preco: 124.50, img: "https://m.media-amazon.com/images/I/71pE7v07N3L._AC_SL1500_.jpg" }
        ];

        let carrinho = [];
        let slideIndex = 0;
        setInterval(() => { slideIndex = (slideIndex + 1) % 3; document.getElementById('slider').style.transform = `translateX(-${slideIndex * 100}vw)`; }, 4000);

        function render() {
            const v = document.getElementById('vitrine');
            v.innerHTML = "";
            produtos.forEach(p => {
                v.innerHTML += `<div class="produto-card">
                    <div class="off-badge">${p.off}</div>
                    <img src="${p.img}" class="img-produto" onerror="this.src='https://via.placeholder.com/150'">
                    <span class="nome">${p.nome}</span>
                    <span class="preco">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                    <button class="btn-add" onclick="add(${p.id})">ADICIONAR</button>
                </div>`;
            });
        }

        function add(id) {
            const p = produtos.find(x => x.id === id);
            const item = carrinho.find(x => x.id === id);
            if(item) { item.qtd++; } else { carrinho.push({...p, qtd: 1}); }
            update();
        }

        function change(id, d) {
            const item = carrinho.find(x => x.id === id);
            item.qtd += d;
            if(item.qtd <= 0) { carrinho = carrinho.filter(x => x.id !== id); }
            update();
        }

        function update() {
            let total = 0;
            const list = document.getElementById('cartItemsList');
            list.innerHTML = "";
            carrinho.forEach(item => {
                total += item.preco * item.qtd;
                list.innerHTML += `<div class="cart-item">
                    <span style="font-size:14px; font-weight:bold;">${item.nome}</span>
                    <div class="controles">
                        <button class="btn-q" onclick="change(${item.id},-1)">-</button>
                        <b>${item.qtd}</b>
                        <button class="btn-q" onclick="change(${item.id},1)">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('total-val').innerText = total.toFixed(2).replace('.',',');
        }

        function toggleModal(s) { document.getElementById('modalCart').style.display = s ? 'block' : 'none'; }

        function enviarZap() {
            const nome = document.getElementById('nomeCliente').value;
            const endereco = document.getElementById('endCliente').value;
            const totalStr = document.getElementById('total-val').innerText;

            if(!nome || !endereco || carrinho.length === 0) return alert("Preencha seu nome, endereço e adicione produtos!");
            
            let msg = `*🛒 NOVO PEDIDO - MEC SHOP*\n\n`;
            msg += `👤 *NOME:* ${nome}\n`;
            msg += `📍 *END:* ${endereco}\n`;
            msg += `--------------------------\n`;
            
            carrinho.forEach(i => {
                msg += `• ${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2).replace('.',',')}\n`;
            });
            
            msg += `--------------------------\n`;
            msg += `💰 *TOTAL: R$ ${totalStr}*`;

            const meuWhats = "5511999999999"; // SUBSTITUA PELO SEU NÚMERO
            window.open(`https://wa.me/${meuWhats}?text=${encodeURIComponent(msg)}`);
        }
        render();
    </script>
</body>
</html>
