<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATÁLOGO INTELIGENTE | ALLAN GELADOS</title>
    <style>
        :root { --primary: #25d366; --dark: #1a1a1a; --gray: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--gray); color: var(--dark); padding-bottom: 100px; }
        
        /* Layout MEC SHOP */
        .header-top { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 12px; font-weight: bold; }
        .slider-container { width: 100%; height: 220px; background: #eee; overflow: hidden; }
        .slider-container img { width: 100%; height: 100%; object-fit: cover; }

        .search-container { padding: 0 20px; margin-top: -20px; }
        .search-box { background: #fff; padding: 12px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 16px; }

        /* Categorias */
        .nav-cats { display: flex; overflow-x: auto; padding: 20px; gap: 10px; scrollbar-width: none; }
        .cat-btn { background: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; white-space: nowrap; font-weight: 600; font-size: 13px; cursor: pointer; }
        .cat-btn.active { background: #000; color: #fff; border-color: #000; }

        /* Grade de Produtos */
        .grid-produtos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { background: #fff; border-radius: 15px; padding: 12px; border: 1px solid #eee; position: relative; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
        .card h3 { font-size: 13px; margin: 10px 0 5px; height: 32px; overflow: hidden; }
        .price-varejo { font-size: 14px; font-weight: 800; color: #000; display: block; }
        .price-atacado { font-size: 11px; color: #2ecc71; font-weight: 700; display: block; margin-bottom: 10px; }
        
        /* Botões */
        .btn-add { background: #000; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .qty-box { display: flex; justify-content: space-between; align-items: center; background: #f0f0f0; border-radius: 8px; padding: 5px; }
        .btn-qty { background: #fff; border: 1px solid #ddd; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; }

        /* Footer Carrinho */
        .cart-footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #eee; z-index: 999; }
        .total-info span { display: block; }
        .btn-finish { background: var(--primary); color: #fff; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header-top">🚚 ENTREGA RÁPIDA - PEDIDO MÍNIMO R$ 30,00</div>

<div class="slider-container">
    <img src="https://images.unsplash.com/photo-1501443762994-82bd5dabb892?w=800" alt="Banner Sergel">
</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="busca" oninput="renderizar()" placeholder="O que você quer tomar hoje?">
    </div>
</div>

<div class="nav-cats" id="categorias">
    <div class="cat-btn active" onclick="filtrar('Tudo', this)">Tudo</div>
    <div class="cat-btn" onclick="filtrar('Potes 2L', this)">Potes 2L</div>
    <div class="cat-btn" onclick="filtrar('Picolés', this)">Picolés</div>
    <div class="cat-btn" onclick="filtrar('Especiais', this)">Especiais</div>
</div>

<div class="grid-produtos" id="vitrine"></div>

<div class="cart-footer">
    <div class="total-info">
        <span style="font-size: 11px; color: #888;">VALOR TOTAL</span>
        <span style="font-size: 20px; font-weight: 900;">R$ <span id="total-cart">0,00</span></span>
    </div>
    <button class="btn-finish" onclick="abrirCheckout()">FINALIZAR</button>
</div>

<div class="modal" id="modalCheckout">
    <div class="modal-content">
        <h2 style="margin-top:0">Finalizar Pedido</h2>
        <div id="lista-resumo" style="margin-bottom: 20px; font-size: 14px; max-height: 120px; overflow-y: auto;"></div>
        <input type="text" id="nome" class="input-field" placeholder="Seu Nome">
        <input type="text" id="endereco" class="input-field" placeholder="Endereço de Entrega">
        <button class="btn-finish" style="width: 100%;" onclick="gerarLinkZap()">ENVIAR PARA O ALLAN</button>
        <button onclick="fecharCheckout()" style="width:100%; background:none; border:none; color:#999; margin-top:15px;">Voltar</button>
    </div>
</div>

<script>
    // BASE DE DADOS BASEADA NAS SUAS IMAGENS
    const produtos = [
        { id: 1, cat: 'Potes 2L', nome: 'Leitinho Trufado 2L', preco: 45.0, atacado: 38.0, min: 10, img: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400' },
        { id: 2, cat: 'Potes 2L', nome: 'Delicielo Avelã 2L', preco: 45.0, atacado: 38.0, min: 10, img: 'https://images.unsplash.com/photo-1534706936160-d5ee67737249?w=400' },
        { id: 3, cat: 'Picolés', nome: 'Skimo Clássico', preco: 7.0, atacado: 2.8, min: 20, img: 'https://images.unsplash.com/photo-1505394033323-424ebb43ef2e?w=400' },
        { id: 4, cat: 'Picolés', nome: 'Picolé de Fruta', preco: 5.0, atacado: 2.2, min: 20, img: 'https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=400' },
        // Adicione aqui todos os outros sabores que você identificou nas fotos
    ];

    let carrinho = [];
    let filtroAtivo = 'Tudo';

    function renderizar() {
        const vitrine = document.getElementById('vitrine');
        const termoBusca = document.getElementById('busca').value.toLowerCase();
        vitrine.innerHTML = '';

        produtos.filter(p => (filtroAtivo === 'Tudo' || p.cat === filtroAtivo) && p.nome.toLowerCase().includes(termoBusca))
        .forEach(p => {
            const noCart = carrinho.find(c => c.id === p.id);
            vitrine.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.nome}</h3>
                    <span class="price-varejo">R$ ${p.preco.toFixed(2).replace('.',',')}</span>
                    <span class="price-atacado">Atacado: R$ ${p.atacado.toFixed(2).replace('.',',')}</span>
                    ${noCart ? `
                        <div class="qty-box">
                            <button class="btn-qty" onclick="mudarQtd(${p.id}, -1)">-</button>
                            <strong>${noCart.qtd}</strong>
                            <button class="btn-qty" onclick="mudarQtd(${p.id}, 1)">+</button>
                        </div>
                    ` : `
                        <button class="btn-add" onclick="mudarQtd(${p.id}, 1)">ADICIONAR</button>
                    `}
                </div>
            `;
        });
        atualizarTotal();
    }

    function mudarQtd(id, delta) {
        const index = carrinho.findIndex(c => c.id === id);
        if (index > -1) {
            carrinho[index].qtd += delta;
            if (carrinho[index].qtd <= 0) carrinho.splice(index, 1);
        } else {
            carrinho.push({...produtos.find(p => p.id === id), qtd: 1});
        }
        renderizar();
    }

    function atualizarTotal() {
        let total = 0;
        carrinho.forEach(item => {
            const precoFinal = item.qtd >= item.min ? item.atacado : item.preco;
            total += precoFinal * item.qtd;
        });
        document.getElementById('total-cart').innerText = total.toFixed(2).replace('.',',');
    }

    function filtrar(cat, el) {
        filtroAtivo = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderizar();
    }

    function abrirCheckout() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        document.getElementById('lista-resumo').innerHTML = carrinho.map(i => {
            const valor = (i.qtd >= i.min ? i.atacado : i.preco);
            return `• ${i.qtd}x ${i.nome} - R$ ${(valor * i.qtd).toFixed(2)}`;
        }).join('<br>');
        document.getElementById('modalCheckout').style.display = 'flex';
    }

    function fecharCheckout() { document.getElementById('modalCheckout').style.display = 'none'; }

    function gerarLinkZap() {
        const nome = document.getElementById('nome').value;
        const end = document.getElementById('endereco').value;
        if(!nome || !end) return alert("Preencha Nome e Endereço!");

        let texto = `*NOVO PEDIDO - ALLAN GELADOS*\n\n*Nome:* ${nome}\n*Endereço:* ${end}\n\n*ÍTENS:*\n`;
        carrinho.forEach(i => {
            const valor = (i.qtd >= i.min ? i.atacado : i.preco);
            texto += `- ${i.qtd}x ${i.nome} (R$ ${valor.toFixed(2)})${i.qtd >= i.min ? ' [ATACADO]' : ''}\n`;
        });
        texto += `\n*TOTAL: R$ ${document.getElementById('total-cart').innerText}*`;
        
        window.open(`https://wa.me/5519996912728?text=${encodeURIComponent(texto)}`);
    }

    renderizar();
</script>
</body>
</html>
