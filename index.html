<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITEBET | SISTEMA INTEGRADO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff41; --accent: #ffd700; --danger: #ff4b4b; --bg: #0b0e11; --card: #161a1e; --border: #2b2f36; --text: #ffffff; --text-dim: #929292; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER & NAVIGATION */
        header { position: fixed; top: 0; width: 100%; height: 65px; background: var(--card); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); z-index: 1000; justify-content: space-between; }
        .nav-group { display: flex; align-items: center; gap: 15px; }
        .icon-btn { font-size: 20px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; width: 30px; }
        .logo { font-weight: 900; font-size: 18px; flex: 1; text-align: center; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* LIVE FEED */
        .live-feed { background: #080a0d; padding: 5px 0; font-size: 10px; color: var(--text-dim); border-bottom: 1px solid var(--border); position: fixed; top: 65px; width: 100%; z-index: 900; overflow: hidden; }
        .feed-track { display: inline-block; white-space: nowrap; animation: scroll 25s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .feed-item { margin-right: 30px; }
        .feed-item b { color: var(--primary); }

        /* SIDE MENU */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); z-index: 1100; transition: 0.4s ease; border-right: 1px solid var(--border); padding: 20px; }
        .side-menu.open { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1050; display: none; }
        .menu-overlay.show { display: block; }

        .container { padding: 105px 15px 100px; max-width: 480px; margin: 0 auto; min-height: 100vh; }
        .screen { display: none; }
        .active { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; margin-bottom: 12px; outline: none; }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--accent); color: #000; }

        /* ROLETA */
        .wheel-box { position: relative; width: 180px; height: 180px; margin: 20px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #222; background: conic-gradient(#111 0% 12.5%, #222 12.5% 25%, #111 25% 37.5%, #222 37.5% 50%, #111 50% 62.5%, #222 62.5% 75%, #111 75% 87.5%, #222 87.5% 100%); transition: 4s cubic-bezier(0.1, 0.7, 0.1, 1); }

        /* BOTTOM NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="side-menu" id="side-menu">
        <h2 style="margin-bottom:25px;">ELITE<span>BET</span></h2>
        <div style="padding: 15px; border-bottom: 1px solid #222; cursor: pointer;" onclick="sair()">Sair</div>
    </div>

    <header id="h-master" style="display:none;">
        <div class="nav-group">
            <div class="icon-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></div>
            <div class="icon-btn" id="btn-voltar" onclick="voltar()" style="display:none;"><i class="fa-solid fa-arrow-left"></i></div>
        </div>
        <div class="logo">ELITE<span>BET</span></div>
        <div style="text-align:right;"><span id="h-saldo" style="color:var(--primary); font-weight:800;">R$ 0,00</span></div>
    </header>

    <div class="live-feed" id="feed-master" style="display:none;">
        <div class="feed-track">
            <span class="feed-item">usuario_99 ganhou <b>R$ 200,00</b></span>
            <span class="feed-item">bet_master ganhou <b>R$ 550,00</b></span>
        </div>
    </div>

    <div class="container">
        
        <div id="scr-login" class="screen active">
            <div class="card" style="text-align:center; margin-top:30px;">
                <h2>LOGIN</h2>
                <input type="text" id="l-user" placeholder="Usuário">
                <input type="password" placeholder="Senha">
                <button class="btn btn-primary" onclick="fazerLogin()">ENTRAR</button>
            </div>
        </div>

        <div id="scr-lobby" class="screen">
            <div class="card" style="text-align:center;">
                <span class="label">SALDO</span>
                <h1 id="main-saldo" style="font-size:45px; color:var(--primary);">R$ 0,00</h1>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                    <button class="btn btn-primary" onclick="irPara('scr-deposito')">DEPÓSITO</button>
                    <button class="btn btn-secondary" onclick="irPara('scr-saque')">SAQUE</button>
                </div>
            </div>
        </div>

        <div id="scr-deposito" class="screen">
            <div class="card">
                <h2>DEPÓSITO PIX</h2>
                <span class="label">VALOR DO DEPÓSITO</span>
                <input type="number" id="dep-v" placeholder="R$ 0,00">
                <button class="btn btn-primary" onclick="alert('QR Code PIX Gerado!');">GERAR PIX</button>
            </div>
        </div>

        <div id="scr-saque" class="screen">
            <div class="card">
                <h2>SOLICITAR SAQUE</h2>
                <span class="label">CHAVE PIX</span>
                <input type="text" placeholder="CPF, Email ou Celular">
                <span class="label">VALOR</span>
                <input type="number" id="saq-v" placeholder="R$ 0,00">
                <button class="btn btn-secondary" onclick="processarSaque()">CONFIRMAR SAQUE</button>
            </div>
        </div>

        <div id="scr-roleta" class="screen">
            <div class="card" style="text-align:center;">
                <h2>ROLETA</h2>
                <div class="wheel-box"><div class="wheel" id="wheel-obj"></div></div>
                <button class="btn btn-secondary" onclick="girar()">GIRAR</button>
            </div>
        </div>

        <div id="scr-admin" class="screen">
            <div class="card">
                <h2>PAINEL MASTER</h2>
                <input type="number" id="adm-s" placeholder="Novo Saldo">
                <button class="btn btn-primary" onclick="salvarAdmin()">ATUALIZAR BANCA</button>
            </div>
        </div>

    </div>

    <nav id="n-master">
        <div class="nav-item active" onclick="irPara('scr-lobby')">🏠<br>Home</div>
        <div class="nav-item" onclick="irPara('scr-roleta')">🎡<br>Roleta</div>
        <div id="n-adm-btn" class="nav-item" style="display:none; color:var(--accent);" onclick="irPara('scr-admin')">🛡️<br>Admin</div>
    </nav>

    <script>
        let saldo = 2500.00;
        let historico = ['scr-login'];

        function irPara(id) {
            if(historico[historico.length - 1] !== id) historico.push(id);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-voltar').style.display = (id === 'scr-login' || id === 'scr-lobby') ? 'none' : 'block';
        }

        function voltar() {
            if(historico.length > 1) {
                historico.pop();
                irPara(historico.pop());
            }
        }

        function fazerLogin() {
            const u = document.getElementById('l-user').value.toLowerCase();
            document.getElementById('h-master').style.display = 'flex';
            document.getElementById('n-master').style.display = 'flex';
            document.getElementById('feed-master').style.display = 'block';
            if(u === 'admin') document.getElementById('n-adm-btn').style.display = 'block';
            irPara('scr-lobby');
            updateUI();
        }

        function processarSaque() {
            const v = parseFloat(document.getElementById('saq-v').value);
            if(v > 0 && v <= saldo) {
                saldo -= v;
                updateUI();
                alert("Saque solicitado com sucesso!");
                irPara('scr-lobby');
            } else {
                alert("Saldo insuficiente ou valor inválido.");
            }
        }

        function updateUI() {
            const f = "R$ " + saldo.toFixed(2).replace('.', ',');
            document.getElementById('h-saldo').innerText = f;
            document.getElementById('main-saldo').innerText = f;
        }

        function salvarAdmin() {
            const v = parseFloat(document.getElementById('adm-s').value);
            if(!isNaN(v)) { saldo = v; updateUI(); alert("Banca atualizada!"); }
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function sair() { location.reload(); }

        function girar() {
            const w = document.getElementById('wheel-obj');
            w.style.transform = `rotate(${Math.floor(Math.random() * 3600) + 3600}deg)`;
        }
    </script>
</body>
</html>
