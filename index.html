<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOJA MEC SHOP | ACHADOS</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background: #000; padding: 10px; text-align: center; }
        
        /* Banner igual da imagem */
        .banner { width: 100%; background: #000; text-align: center; padding-bottom: 20px; }
        .banner img { width: 100%; max-width: 800px; height: auto; }

        /* Grade de Produtos */
        .container { display: flex; justify-content: center; gap: 15px; padding: 20px; flex-wrap: wrap; }
        .product-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 160px; padding: 15px; text-align: center; border: 1px solid #eee; }
        .product-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .product-card h3 { font-size: 14px; margin: 5px 0; color: #666; }
        .price-old { text-decoration: line-through; color: #bbb; font-size: 11px; margin: 0; }
        .price-new { color: #00a8e8; font-size: 18px; font-weight: bold; margin: 5px 0; }
        
        /* Controles de Quantidade */
        .qty { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 10px 0; }
        .qty button { background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
        
        .btn-add { background-color: #00a8e8; color: #fff; border: none; padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* Barra de Finalização Verde (Igual da imagem) */
        .footer-cart { position: fixed; bottom: 80px; left: 0; width: 100%; background: #000; padding: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-limpar { background: #ff5e5e; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
        .btn-finish { background: #2ecc71; color: #fff; border: none; padding: 10px 60px; border-radius: 5px; font-weight: bold; font-size: 16px; flex-grow: 0.5; max-width: 300px; }

        /* Rodapé de Pagamento */
        footer { background: #000; color: #fff; padding: 20px; text-align: center; margin-top: 50px; border-top: 1px solid #333; margin-bottom: 150px; }
    </style>
</head>
<body>

    <div class="banner">
        <img src="https://via.placeholder.com/800x400/000/00f2ff?text=LOJA+MEC+SHOP+ACHADOS" alt="Banner Mec Shop">
    </div>

    <div class="container">
        <div class="product-card">
            <img src="https://via.placeholder.com/150/ff0000/fff?text=Tenis" alt="Produto 1">
            <h3>Produto 01</h3>
            <p class="price-old">De: R$ 90,00</p>
            <p class="price-new">Por: R$ 50,00</p>
            <div class="qty">
                <button>-</button><span>1</span><button>+</button>
            </div>
            <button class="btn-add">ADICIONAR</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150/ffcc00/000?text=Fone" alt="Produto 2">
            <h3>Produto 02</h3>
            <p class="price-old">De: R$ 150,00</p>
            <p class="price-new">Por: R$ 80,00</p>
            <div class="qty">
                <button>-</button><span>1</span><button>+</button>
            </div>
            <button class="btn-add">ADICIONAR</button>
        </div>
    </div>

    <div class="footer-cart">
        <button class="btn-limpar">LIMPAR</button>
        <button class="btn-finish">FINALIZAR</button>
    </div>

    <footer>
        <p style="font-size: 14px; margin-bottom: 15px;">FORMAS DE PAGAMENTO SEGURAS</p>
        <div style="display: flex; justify-content: center; gap: 15px;">
             <span style="background: #fff; color: #000; padding: 5px; border-radius: 4px; font-weight: bold; font-size: 10px;">💠 PIX</span>
             <span style="background: #fff; color: #000; padding: 5px; border-radius: 4px; font-weight: bold; font-size: 10px;">💳 CARTÃO</span>
        </div>
        <p style="font-size: 10px; color: #666; margin-top: 15px;">🔒 Ambiente 100% Seguro - MEC SHOP 2026</p>
    </footer>

</body>
</html>
