<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAY GAME | ULTRA FAST</title>
    <style>
        :root { --bg: #05070a; --green: #00ff41; --gold: #ffd700; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 1000; }
        .container { padding: 80px 15px 30px; max-width: 450px; margin: 0 auto; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--glass); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 14px; border-radius: 10px; color: #fff; margin-bottom: 10px; }
        .btn-green { width: 100%; background: var(--green); color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: 900; cursor: pointer; }
        
        /* MENU LATERAL */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0a0f19; z-index: 2000; transition: 0.3s; padding: 25px; border-right: 1px solid var(--border); }
        .side-menu.open { left: 0; }
        .menu-item { padding: 15px 0; color: #ccc; border-bottom: 1px solid #111; cursor: pointer; }
        
        /* CHAT */
        .chat-box { background: #000; border-radius: 10px; height: 300px; overflow-y: auto; padding: 15px; margin-bottom: 10px; border: 1px solid #222; }
        .msg { padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 8px; max-width: 80%; }
        .msg.bot { background: #111; align-self: flex-start; }
        .msg.user { background: var(--green); color: #000; margin-left: auto; }
        .waiting-box { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; text-align: center; font-size: 11px; display: none; }
    </style>
</head>
<body>
    <header>
        <div id="btn-menu" style="cursor:pointer; font-size:24px; color:var(--green);" onclick="toggleMenu()">☰</div>
        <div id="header-balance" style="margin-left:auto; font-weight:900; color:var(--green);">R$ 450,00</div>
    </header>

    <div class="side-menu" id="side-menu">
        <h2 style="color:var(--gold); margin-bottom:20px;">MENU VIP</h2>
        <div class="menu-item" onclick="irPara('screen-dash'); toggleMenu()">🏠 Início</div>
        <div class="menu-item" onclick="irPara('screen-deposito'); toggleMenu()">💰 Depositar PIX</div>
        <div class="menu-item" onclick="irPara('screen-saque'); toggleMenu()">💸 Solicitar Saque</div>
        <div class="menu-item" style="color:var(--green);" onclick="irPara('screen-chat'); toggleMenu()">💬 Suporte Online</div>
        <div class="menu-item" style="color:red; margin-top:50px;" onclick="location.reload()">🚪 Sair</div>
    </div>

    <div class="container">
        <div id="screen-dash" class="screen active">
            <div class="card" style="text-align:center;">
                <p style="font-size:10px; color:#555;">SALDO ATUAL</p>
                <h1 style="font-size:48px; color:var(--green); margin:10px 0;">R$ 450,00</h1>
                <button class="btn-green">JOGAR AGORA</button>
            </div>
        </div>

        <div id="screen-chat" class="screen">
            <div class="card">
                <h1>Suporte VIP</h1>
                <div class="chat-box" id="chat-content">
                    <div class="msg bot">Olá! Como podemos ajudar sua conta hoje?</div>
                </div>
                <div id="chat-opts">
                    <button class="btn-green" style="font-size:12px; margin-bottom:5px;" onclick="entrarFila()">Falar com Atendente (Fila 30s)</button>
                </div>
                <div class="waiting-box" id="fila-box">⏳ Posição na Fila: <span id="pos">18</span>º<br><small>Tempo médio: 30s por posição</small></div>
                <button class="btn-green" style="background:none; color:#555; margin-top:10px;" onclick="irPara('screen-dash')">VOLTAR</button>
            </div>
        </div>

        <div id="screen-deposito" class="screen"><div class="card"><h1>Depositar</h1><input type="number" placeholder="Valor R$"><button class="btn-green">GERAR PIX</button></div></div>
        <div id="screen-saque" class="screen"><div class="card"><h1>Saque VIP</h1><input type="number" placeholder="Valor R$"><button class="btn-green">SOLICITAR VIA PIX</button></div></div>
    </div>

    <script>
        function irPara(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function toggleMenu() { const m = document.getElementById('side-menu'); m.style.left = m.style.left === '0px' ? '-280px' : '0px'; }
        function entrarFila() {
            document.getElementById('chat-opts').style.display = 'none';
            document.getElementById('fila-box').style.display = 'block';
            let p = 18;
            setInterval(() => { if(p > 1) { p--; document.getElementById('pos').innerText = p; } }, 30000);
        }
    </script>
</body>
        </html>
