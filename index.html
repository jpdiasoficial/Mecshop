<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Oficial</title>
    <style>
        :root { --red: #ea1d2c; --green: #25d366; --dark: #3e3e3e; --gray: #717171; --light-bg: #f2f2f2; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; color: var(--dark); padding-bottom: 110px; }
        .header { padding: 15px; border-bottom: 1px solid #eee; font-weight: 800; text-transform: uppercase; text-align: center; color: var(--red); letter-spacing: 1px; }
        .banner { width: 100%; height: 140px; background: #111; overflow: hidden; position: relative; }
        .banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .cat-bar { display: flex; overflow-x: auto; padding: 15px; gap: 12px; scrollbar-width: none; background: #fff; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cat-card { display: flex; flex-direction: column; align-items: center; min-width: 75px; border: none; background: none; cursor: pointer; }
        .cat-circle { width: 50px; height: 50px; background: var(--light-bg); border-radius: 50%; margin-bottom: 5px; border: 2px solid transparent; overflow: hidden; }
        .cat-circle img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card.active .cat-circle { border-color: var(--red); background: #fff; }
        .cat-name { font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f2f2f2; }
        .item-main { display: flex; justify-content: space-between; align-items: center; }
        .item-info h3 { margin: 0; font-size: 15px; font-weight: 700; text-transform: uppercase; }
        .size-selector { display: flex; gap: 5px; margin: 8px 0; }
        .btn-size { border: 1px solid #ddd; background: #fff; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .btn-size.active { border-color: var(--red); color: var(--red); background: #fff5f5; }
        .price { color: #2e7d32; font-weight: 700; font-size: 16px; margin-top: 4px; }
        .qty-box { display: flex; align-items: center; gap: 10px; background: var(--light-bg); border-radius: 20px; padding: 4px 10px; min-width: 85px; justify-content: center; }
        .btn-q { border: none; background: none; color: var(--red); font-size: 18px; font-weight: 900; cursor: pointer; width: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; box-sizing: border-box; max-height: 95vh; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; font-family: inherit; font-size: 14px; }
        .btn-wa { display: block; background: var(--green); color: #fff; padding: 14px; border-radius: 6px; text-decoration: none; font-weight: 700; margin-bottom: 10px; text-align: center; text-transform: uppercase; font-size: 14px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-fin { background: var(--red); color: #fff; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">Chris Gastronomia</div>
    <div class="banner"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=800"></div>

    <div class="cat-bar">
        <button id="cat-todos" class="cat-card active" onclick="filter('todos')"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100"></div><div class="cat-name">Inicio</div></button>
        <button id="cat-marmita" class="cat-card" onclick="filter('marmita')"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=100"></div><div class="cat-name">Marmitas</div></button>
        <button id="cat-batata" class="cat-card" onclick="filter('batata')"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=100"></div><div class="cat-name">Batatas</div></button>
        <button id="cat-bebida" class="cat-card" onclick="filter('bebida')"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1581009146145-b5ef03a7403f?w=100"></div><div class="cat-name">Bebidas</div></button>
    </div>

    <div id="lista-p"></div>

    <div id="modal-f" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; text-transform: uppercase; font-size: 15px;">Revisao do Pedido</h3>
            <div id="resumo-final"></div>
            <div style="font-size:18px; font-weight:800; text-align:right; margin:15px 0; color:#2e7d32; border-top: 1px solid #eee; padding-top: 10px;">Total: R$ <span id="total-modal">0,00</span></div>
            <input type="text" id="nome-cliente" placeholder="Seu Nome Completo">
            <select id="metodo" onchange="toggleEntrega()"><option value="delivery">Delivery</option><option value="retirada">Retirada no Local</option></select>
            <div id="campos-entrega">
                <div style="display:flex; gap:8px"><input type="text" id="cep" placeholder="CEP" onblur="buscarEndereco()" maxlength="8"><input type="text" id="num" placeholder="N."></div>
                <input type="text" id="rua" placeholder="Rua / Avenida" readonly style="background:#f9f9f9">
                <input type="text" id="compl" placeholder="Complemento (Apto, Condominio)">
            </div>
            <textarea id="obs" placeholder="Observacoes sobre o pedido"></textarea>
            <a href="#" class="btn-wa" onclick="enviar('5512997136890')">Confirmar via WhatsApp 1</a>
            <a href="#" class="btn-wa" style="background:#128c7e" onclick="enviar('5512981906835')">Confirmar via WhatsApp 2</a>
            <button onclick="fecharModal()" style="border:none; background:none; color:var(--gray); cursor:pointer; width:100%; font-size: 11px; text-transform: uppercase;">Voltar</button>
        </div>
    </div>

    <div class="footer">
        <div><div style="font-size:10px; color:var(--gray); text-transform: uppercase;">Subtotal</div><div style="font-size:18px; font-weight:700">R$ <span id="total-p">0,00</span></div></div>
        <button class="btn-fin" onclick="abrirModal()">Finalizar Pedido</button>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Strogonoff", sizes: { "Padrao": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Frango", sizes: { "Padrao": 25.00 } },
            { id: 4, cat: 'batata', nome: "Batata Calabresa", sizes: { "Padrao": 25.00 } },
            { id: 5, cat: 'bebida', nome: "Coca-Cola", sizes: { "Lata": 6.50, "600ml": 9.00, "2L": 15.00 } },
            { id: 6, cat: 'bebida', nome: "Guarana Antarctica", sizes: { "Lata": 6.00, "2L": 12.00 } }
        ];

        let cart = []; let selection = {}; let categoriaAtual = 'todos';

        function render() {
            const itens = categoriaAtual === 'todos' ? produtos : produtos.filter(p => p.cat === categoriaAtual);
            document.getElementById('lista-p').innerHTML = itens.map(p => {
                const s = selection[p.id] || Object.keys(p.sizes)[0]; selection[p.id] = s;
                const i = cart.find(x => x.id == p.id && x.size == s) || {qtd:0};
                return `<div class="menu-item"><div class="item-main"><div class="item-info"><h3>${p.nome}</h3><div class="size-selector">${Object.keys(p.sizes).map(z => `<button class="btn-size ${z==s?'active':''}" onclick="setSize(${p.id},'${z}')">${z}</button>`).join('')}</div><div class="price">R$ ${p.sizes[s].toFixed(2).replace('.',',')}</div></div><div class="qty-box"><button class="btn-q" onclick="update(${p.id},-1,'${s}')">-</button><span style="font-weight:700">${i.qtd}</span><button class="btn-q" onclick="update(${p.id},1,'${s}')">+</button></div></div></div>`;
            }).join('');
            atualizarValores();
        }

        function filter(cat) { categoriaAtual = cat; document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active')); document.getElementById('cat-' + cat).classList.add('active'); render(); }
        function setSize(id, s) { selection[id] = s; render(); }
        function update(id, d, sManual = null) {
            const s = sManual || selection[id]; const idx = cart.findIndex(i => i.id == id && i.size == s);
            if (idx > -1) { cart[idx].qtd += d; if (cart[idx].qtd <= 0) cart.splice(idx, 1); }
            else if (d > 0) { const p = produtos.find(x => x.id == id); cart.push({ id, nome: p.nome, size: s, preco: p.sizes[s], qtd: 1 }); }
            render(); if(document.getElementById('modal-f').style.display === 'flex') renderResumo();
        }
        function atualizarValores() { const t = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0).toFixed(2).replace('.', ','); document.getElementById('total-p').innerText = t; document.getElementById('total-modal').innerText = t; }
        function toggleEntrega() { document.getElementById('campos-entrega').style.display = document.getElementById('metodo').value === 'retirada' ? 'none' : 'block'; }
        function buscarEndereco() { const c = document.getElementById('cep').value.replace(/\D/g, ''); if (c.length == 8) fetch(`https://viacep.com.br/ws/${c}/json/`).then(r => r.json()).then(d => { if (!d.erro) document.getElementById('rua').value = d.logradouro; }); }
        
        function renderResumo() {
            document.getElementById('resumo-final').innerHTML = cart.map(i => `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px">
                    <div style="flex:1">
                        <div style="font-size:14px"><b>${i.nome}</b> (${i.size})</div>
                        <div style="font-size:12px; color:#2e7d32">R$ ${i.preco.toFixed(2).replace('.',',')} cada</div>
                    </div>
                    <div class="qty-box" style="padding: 2px 10px; min-width: 75px">
                        <button class="btn-q" onclick="update(${i.id},-1,'${i.size}')">-</button>
                        <span>${i.qtd}</span>
                        <button class="btn-q" onclick="update(${i.id},1,'${i.size}')">+</button>
                    </div>
                </div>`).join('');
        }

        function abrirModal() { if(!cart.length) return alert("Seu carrinho esta vazio!"); renderResumo(); document.getElementById('modal-f').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal-f').style.display = 'none'; }
        
        function enviar(num) {
            const nome = document.getElementById('nome-cliente').value, m = document.getElementById('metodo').value, r = document.getElementById('rua').value, n = document.getElementById('num').value, c = document.getElementById('compl').value, t = document.getElementById('total-p').innerText, o = document.getElementById('obs').value;
            if(!nome) return alert("Por favor, informe seu nome.");
            if(m === 'delivery' && (!r || !n)) return alert("Preencha o endereco para entrega.");
            let msg = `PEDIDO CHRIS GASTRONOMIA\n--------------------------\n`;
            msg += `Cliente: ${nome}\n\n`;
            cart.forEach(i => msg += `- ${i.qtd}x ${i.nome} (${i.size}): R$ ${(i.preco * i.qtd).toFixed(2).replace('.',',')}\n`);
            msg += `\nTipo: ${m === 'delivery' ? 'Delivery' : 'Retirada no Local'}`;
            if(m === 'delivery') msg += `\nEndereco: ${r}, ${n}\nComplemento: ${c}`;
            if(o) msg += `\nObservacao: ${o}`;
            msg += `\n\nVALOR TOTAL: R$ ${t}`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
        }
        render();
    </script>
</body>
</html>
