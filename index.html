<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC SHOP | WHATSAPP DIRETO</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --btn-green: #2ecc71;
            --discount-red: #ff4757;
            --bg-gray: #f0f2f5;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-gray); padding-bottom: 120px; }

        /* HEADER */
        .header { background: #000; color: white; padding: 20px; text-align: center; border-bottom: 3px solid var(--neon-blue); }

        /* GRID PRODUTOS */
        .loja-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .produto-caixa { background: #fff; border-radius: 20px; padding: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        .img-produto { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        .nome { font-size: 13px; font-weight: 700; color: #333; height: 35px; display: block; overflow: hidden; }
        .preco-por { color: #000; font-size: 18px; font-weight: 900; display: block; margin: 8px 0; }
        .btn-add { background: #000; color: var(--neon-blue); border: 2px solid var(--neon-blue); padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 800; }

        /* FOOTER BAR */
        .footer-cart { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 999; border-radius: 25px 25px 0 0; }
        
        /* MODAL */
        .modal-cart { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        .modal-content { position: absolute; bottom: 0; background: #fff; width: 100%; max-height: 90%; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        
        /* FORMULÁRIO */
        .checkout-form { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .input-group { margin-bottom: 10px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        .btn-finalizar { background: var(--btn-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 16px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MEC SHOP</h1>
    </div>

    <div id="vitrine" class="loja-grid"></div>

    <div class="footer-cart" onclick="toggleModal(true)">
        <div><b>Total: R$ <span id="total-val">0,00</span></b></div>
        <button class="btn-add" style="width:auto; padding: 10px 20px;">VER PEDIDO</button>
    </div>

    <div class="modal-cart" id="modalCart">
        <div class="modal-content">
            <h2 style="margin-top:0">🛒 Finalizar no WhatsApp</h2>
            <div id="cartItemsList"></div>

            <div class="checkout-form">
                <div class="input-group"><input type="text" id="nomeCliente" placeholder="Seu Nome"></div>
                <div class="input-group"><input type="text" id="endCliente" placeholder="Endereço de Entrega"></div>
                <div class="input-group">
                    <select id="pagamento">
                        <option value="Pix">Pix</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                <button class="btn-finalizar" onclick="enviarWhatsApp()">ENVIAR PEDIDO AGORA</button>
                <button onclick="toggleModal(false)" style="width:100%; background:none; border:none; color:#999; margin-top:10px;">Voltar à Loja</button>
            </div>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: "Ténis Performance Tech", preco: 187.00, img: "https://via.placeholder.com/150" },
            { id: 2, nome: "Fone Bluetooth Pro", preco: 79.90, img: "https://via.placeholder.com/150" },
            { id: 3, nome: "Relógio Smart V8", preco: 245.00, img: "https://via.placeholder.com/150" }
        ];

        let carrinho = [];

        function render() {
            const v = document.getElementById('vitrine');
            v.innerHTML = "";
            produtos.forEach(p => {
                v.innerHTML += `
                <div class="produto-caixa">
                    <img src="${p.img}" class="img-produto">
                    <span class="nome">${p.nome}</span>
                    <span class="preco-por">R$ ${p.preco.toFixed(2)}</span>
                    <button class="btn-add" onclick="addAoCarrinho(${p.id})">ADICIONAR</button>
                </div>`;
            });
        }

        function addAoCarrinho(id) {
            const p = produtos.find(x => x.id === id);
            const item = carrinho.find(x => x.id === id);
            if(item) { item.qtd++; } else { carrinho.push({...p, qtd: 1}); }
            atualizarUI();
        }

        function atualizarUI() {
            let total = 0;
            const list = document.getElementById('cartItemsList');
            list.innerHTML = "";
            carrinho.forEach(item => {
                total += item.preco * item.qtd;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${item.qtd}x ${item.nome}</span>
                    <span>R$ ${(item.preco * item.qtd).toFixed(2)}</span>
                </div>`;
            });
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        function toggleModal(s) { document.getElementById('modalCart').style.display = s ? 'block' : 'none'; }

        // ESTE É O COMANDO QUE ESTÁ NO TEU BLOCO DE NOTAS 1
        function enviarWhatsApp() {
            const nome = document.getElementById('nomeCliente').value;
            const endereco = document.getElementById('endCliente').value;
            const pag = document.getElementById('pagamento').value;

            if(!nome || !endereco || carrinho.length === 0) return alert("Por favor, preencha os dados!");

            let msg = "*🛒 NOVO PEDIDO - MEC SHOP*\n\n";
            msg += "👤 *CLIENTE:* " + nome + "\n";
            msg += "📍 *ENDEREÇO:* " + endereco + "\n";
            msg += "💳 *PAGAMENTO:* " + pag + "\n\n";
            msg += "📦 *ITENS:*\n";
            
            let total = 0;
            carrinho.forEach(item => {
                msg += "• " + item.qtd + "x " + item.nome + " (R$ " + (item.preco * item.qtd).toFixed(2) + ")\n";
                total += item.preco * item.qtd;
            });

            msg += "\n💰 *TOTAL: R$ " + total.toFixed(2) + "*";

            const fone = "5511999999999"; // ALTERA PARA O TEU NÚMERO
            window.open("https://wa.me/" + fone + "?text=" + encodeURIComponent(msg));
        }

        render();
    </script>
</body>
</html>
