<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Delivery | iFood Style</title>
    <style>
        :root { --ifood-red: #ea1d2c; --bg: #fff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Header */
        .header { padding: 15px; border-bottom: 1px solid #f2f2f2; position: sticky; top: 0; background: #fff; z-index: 100; }
        .search { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #f2f2f2; box-sizing: border-box; }

        /* FLYER / CARROSSEL */
        .banner-container { width: 100%; height: 180px; overflow: hidden; position: relative; background: #eee; }
        .slider { display: flex; width: 300%; height: 100%; transition: transform 0.5s ease; }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-label { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        /* CATEGORIAS iFOOD */
        .cat-bar { display: flex; overflow-x: auto; padding: 20px 15px; gap: 15px; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-btn { display: flex; flex-direction: column; align-items: center; border: none; background: none; min-width: 70px; cursor: pointer; }
        .cat-img { width: 60px; height: 60px; border-radius: 50%; background: #f8f8f8; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 8px rgba(0,0,0,0.08); margin-bottom: 5px; border: 2px solid transparent; }
        .cat-btn.active .cat-img { border-color: var(--ifood-red); background: #fff; }
        .cat-btn.active span { color: var(--ifood-red); font-weight: bold; }

        /* ITENS DO CARDÁPIO */
        .item { display: flex; padding: 15px; border-bottom: 1px solid #f2f2f2; justify-content: space-between; align-items: center; }
        .item.indisponivel { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-name { font-weight: 700; font-size: 16px; color: #3e3e3e; }
        .item-desc { font-size: 13px; color: #717171; margin: 4px 0; }
        .item-price { color: #2e7d32; font-weight: 600; }

        /* CONTROLES QTD */
        .controls { display: flex; align-items: center; gap: 12px; background: #f2f2f2; border-radius: 20px; padding: 6px 14px; }
        .btn-q { border: none; background: none; color: var(--ifood-red); font-size: 18px; font-weight: bold; cursor: pointer; }

        /* FOOTER */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-final { background: var(--ifood-red); color: #fff; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; font-size: 18px; margin-bottom: 8px;">CHRIS DELIVERY 🍱</div>
        <input type="text" class="search" placeholder="Busque por marmitas ou batatas...">
    </div>

    <div class="banner-container">
        <div class="slider" id="main-slider">
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" alt="Marmitex">
                <div class="slide-label">🍱 Comida Caseira com Sabor e Carinho</div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=600" alt="Batata">
                <div class="slide-label">🥔 Batatas Recheadas das 18:00 às 22:00</div>
            </div>
            <div class="slide">
                <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=600" alt="Promo">
                <div class="slide-label">📍 Endereço: Av. Theodorico Cavalcante de Souza, 1305</div>
            </div>
        </div>
    </div>

    <div class="cat-bar" id="categorias">
        <button class="cat-btn active" onclick="filterCat('todos', this)">
            <div class="cat-img">🌟</div><span style="font-size: 12px;">Início</span>
        </button>
        <button class="cat-btn" onclick="filterCat('marmita', this)">
            <div class="cat-img">🍱</div><span style="font-size: 12px;">Marmita</span>
        </button>
        <button class="cat-btn" onclick="filterCat('batata', this)">
            <div class="cat-img">🥔</div><span style="font-size: 12px;">Batata</span>
        </button>
        <button class="cat-btn" onclick="filterCat('bebida', this)">
            <div class="cat-img">🥤</div><span style="font-size: 12px;">Bebidas</span>
        </button>
    </div>

    <div id="lista-produtos">Carregando cardápio...</div>

    <div class="footer">
        <div><small style="color:#717171">Total</small><br><strong id="total-val" style="font-size:18px">R$ 0,00</strong></div>
        <button class="btn-final" onclick="finalizar()">Ver Carrinho</button>
    </div>

    <script>
        // CONFIGURAÇÃO DA PLANILHA (Substitua pela sua URL CSV após publicar no Sheets)
        const SHEET_URL = 'SUA_URL_CSV_AQUI';
        
        let produtos = [
            // Dados extraídos das imagens enviadas
            { id: '1', cat: 'marmita', nome: "Marmitex do Dia", desc: "Arroz, feijão, mistura e guarnição.", preco: 17.00, disp: 'Sim' },
            { id: '2', cat: 'batata', nome: "Batata Strogonoff de Carne", desc: "Feita com muito amor e carinho.", preco: 25.00, disp: 'Sim' },
            { id: '3', cat: 'batata', nome: "Batata Frango Desfiado", desc: "Recheio cremoso e batata palha.", preco: 25.00, disp: 'Sim' },
            { id: '4', cat: 'batata', nome: "Batata Calabresa / Bacon", desc: "Deliciosa batata recheada.", preco: 25.00, disp: 'Sim' }
        ];
        let carrinho = [];

        // Carrossel Automático
        let curSlide = 0;
        setInterval(() => {
            curSlide = (curSlide + 1) % 3;
            document.getElementById('main-slider').style.transform = `translateX(-${curSlide * 33.33}%)`;
        }, 4000);

        function render(itens = produtos) {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = itens.map(p => {
                const noCart = carrinho.find(c => c.id === p.id) || {qtd: 0};
                const disponivel = p.disp.toLowerCase() === 'sim';
                return `
                    <div class="item ${disponivel ? '' : 'indisponivel'}">
                        <div class="item-info">
                            <div class="item-name">${p.nome}</div>
                            <div class="item-desc">${p.desc}</div>
                            <div class="item-price">R$ ${p.preco.toFixed(2).replace('.',',')}</div>
                        </div>
                        ${disponivel ? `
                        <div class="controls">
                            <button class="btn-q" onclick="update('${p.id}', -1)">-</button>
                            <span class="qty-val">${noCart.qtd}</span>
                            <button class="btn-q" onclick="update('${p.id}', 1)">+</button>
                        </div>` : '<strong>ESGOTADO</strong>'}
                    </div>
                `;
            }).join('');
        }

        function update(id, delta) {
            const idx = carrinho.findIndex(c => c.id === id);
            if(idx > -1) {
                carrinho[idx].qtd += delta;
                if(carrinho[idx].qtd <= 0) carrinho.splice(idx, 1);
            } else if(delta > 0) {
                const p = produtos.find(x => x.id === id);
                carrinho.push({...p, qtd: 1});
            }
            render();
            const total = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            document.getElementById('total-val').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const itens = cat === 'todos' ? produtos : produtos.filter(p => p.cat === cat);
            render(itens);
        }

        function finalizar() {
            if(!carrinho.length) return alert("Adicione itens ao carrinho!");
            let m = `*NOVO PEDIDO - CHRIS*\n\n`;
            carrinho.forEach(i => m += `• ${i.qtd}x ${i.nome}\n`);
            m += `\n*TOTAL: ${document.getElementById('total-val').innerText}*`;
            
            // Números atualizados conforme as imagens (12) 99713-6890 e (12) 98190-6835
            window.open(`https://wa.me/5512997136890?text=${encodeURIComponent(m)}`);
        }

        render();
    </script>
</body>
</html>
