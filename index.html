<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE LOG V20 | GESTÃO INDUSTRIAL</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0052cc; --s: #36b37e; --d: #ff4b4b; --bg: #f4f7fa; --dark: #091e42; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 50px; }
        
        /* HEADER OPERACIONAL */
        header { background: var(--p); color: white; padding: 25px 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-bar { display: flex; background: white; border-bottom: 2px solid #eee; padding: 12px; gap: 10px; sticky; top: 0; }
        .stat { flex: 1; padding: 10px; border-radius: 10px; text-align: center; font-size: 10px; font-weight: 900; text-transform: uppercase; }

        /* INTERFACE DE DOCA */
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #f0f2f5; border-radius: 12px; margin-bottom: 12px; font-size: 15px; font-weight: 600; outline: none; }
        input:focus { border-color: var(--p); }

        /* SCANNER INDUSTRIAL */
        #scanner-box { width: 100%; height: 280px; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 4px solid var(--s); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: var(--d); box-shadow: 0 0 10px var(--d); animation: move 2s infinite; }
        @keyframes move { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        /* BOTÕES DE AÇÃO */
        .btn { border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; margin-top: 10px; }
        .btn:active { transform: scale(0.96); }

        /* LOG DE AUDITORIA (DONO/GERENTE) */
        .log-list { margin-top: 15px; max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #fafafa; font-size: 12px; }
        .sync-on { color: var(--s); font-weight: bold; }
        .sync-off { color: orange; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h2 style="letter-spacing: -1px;">ELITE LOG V20</h2>
    <p style="font-size: 10px; opacity: 0.7;">GESTOR OPERACIONAL: <b>JP DIAS</b></p>
</header>

<div class="status-bar">
    <div class="stat" style="background:#e3f2fd; color:#1565c0;">FILA: <span id="q">0</span></div>
    <div class="stat" style="background:#e8f5e9; color:#2e7d32;">NUVEM: <span id="n">0</span></div>
    <div class="stat" style="background:#fff3e0; color:#ef6c00;">SINAL: <span id="sig">OK</span></div>
</div>

<div class="container">
    <div class="card">
        <label>Selecione o Cliente Shark</label>
        <select id="cli">
            <option>CLIENTE SHARK 01</option>
            <option>CLIENTE SHARK 02</option>
            <option>AGÊNCIA PARCEIRA</option>
        </select>
        
        <label>Controle de Placa (Logística)</label>
        <input type="text" id="pla" placeholder="PLACA DO VEÍCULO" style="text-transform: uppercase;">
    </div>

    <div class="card" style="text-align: center;">
        <div id="scanner-box">
            <video id="video"></video>
            <div class="laser"></div>
        </div>
        <button onclick="ativarScanner()" id="btn-scan" class="btn btn-s"><i class="fa-solid fa-barcode"></i> LIGAR SCANNER LASER</button>
        <p id="res" style="margin-top:15px; font-weight: 800; color: var(--p);">AGUARDANDO BIPAGEM...</p>
    </div>

    <div class="card">
        <button onclick="syncNow()" class="btn btn-p"><i class="fa-solid fa-cloud-arrow-up"></i> FORÇAR SINCRONIA GOOGLE</button>
        <div class="log-list" id="logs"></div>
        <button onclick="limpar()" class="btn" style="background:#eee; color:#666; font-size:10px; margin-top:15px; padding:10px;">LIMPAR SESSÃO (Zerar Tudo)</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('elite_v20_db')) || [];
    const reader = new ZXing.BrowserMultiFormatReader();

    function ativarScanner() {
        const p = document.getElementById('pla').value;
        if(!p) return alert("ERRO: Digite a PLACA para auditoria!");
        document.getElementById('btn-scan').style.display = 'none';

        reader.decodeFromVideoDevice(null, 'video', (res) => {
            if (res) {
                if(db.find(i => i.id === res.text)) {
                    vibrar(200);
                    document.getElementById('res').innerHTML = "<span style='color:var(--d)'>DUPLICADO!</span>";
                    return;
                }
                
                const item = {
                    id: res.text,
                    cli: document.getElementById('cli').value,
                    pla: p.toUpperCase(),
                    h: new Date().toLocaleTimeString(),
                    s: false
                };

                db.unshift(item);
                vibrar(50);
                save();
            }
        });
    }

    function save() {
        localStorage.setItem('elite_v20_db', JSON.stringify(db));
        render();
        if(navigator.onLine) syncNow();
    }

    function syncNow() {
        // Simulação de Sincronia com Google Sheets
        db.forEach(i => i.s = true);
        localStorage.setItem('elite_v20_db', JSON.stringify(db));
        document.getElementById('sig').innerText = "SINCRONIZADO";
        render();
    }

    function render() {
        document.getElementById('q').innerText = db.filter(i => !i.s).length;
        document.getElementById('n').innerText = db.filter(i => i.s).length;
        
        const logs = document.getElementById('logs');
        logs.innerHTML = db.slice(0,5).map(i => `
            <div class="log-item">
                <b>${i.id}</b>
                <span class="${i.s ? 'sync-on' : 'sync-off'}">${i.s ? 'OK' : 'FILA'}</span>
            </div>
        `).join('');
    }

    function limpar() { if(confirm("Zerar banco de dados?")) { db = []; save(); location.reload(); } }
    function vibrar(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
    render();
</script>
</body>
</html>
