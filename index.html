<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gastronomia | Oficial</title>
    <style>
        :root { --ifood-red: #ea1d2c; --text-dark: #3e3e3e; --text-light: #717171; }
        body { font-family: 'Helvetica Neue', Helvetica, sans-serif; margin: 0; background: #fff; color: var(--text-dark); padding-bottom: 100px; }

        .header { padding: 20px 15px; background: #fff; border-bottom: 1px solid #f2f2f2; font-weight: 700; text-transform: uppercase; }
        .banner-container { width: 100%; height: 160px; overflow: hidden; background: #111; position: relative; }
        .banner-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .cat-bar { display: flex; overflow-x: auto; padding: 20px 15px; gap: 15px; scrollbar-width: none; }
        .cat-card { display: flex; flex-direction: column; align-items: center; min-width: 80px; border: none; background: none; cursor: pointer; }
        .cat-circle { width: 60px; height: 60px; background: #f8f8f8; border-radius: 50%; margin-bottom: 8px; border: 2px solid transparent; overflow: hidden; }
        .cat-circle img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card.active .cat-circle { border-color: var(--ifood-red); }
        .cat-name { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

        .menu-item { padding: 20px 15px; border-bottom: 1px solid #f2f2f2; }
        .item-title { font-size: 16px; font-weight: 700; }
        .size-box { display: flex; gap: 8px; margin: 12px 0; }
        .size-btn { border: 1px solid #dcdcdc; background: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .size-btn.active { border-color: var(--ifood-red); color: var(--ifood-red); background: #fff5f5; }

        .item-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: #2e7d32; font-weight: 700; }
        .qty-box { display: flex; align-items: center; gap: 12px; background: #f2f2f2; border-radius: 20px; padding: 5px 12px; }
        .btn-q { border: none; background: none; color: var(--ifood-red); font-size: 20px; font-weight: 700; cursor: pointer; }

        /* MODAL DE FINALIZAÇÃO ATUALIZADO */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
        .modal-content { background: #fff; width: 100%; max-width: 450px; border-radius: 15px; padding: 25px; box-sizing: border-box; }
        
        .resumo-pedido { text-align: left; margin-bottom: 20px; border-bottom: 2px solid #f2f2f2; padding-bottom: 15px; }
        .resumo-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }

        .address-form { text-align: left; margin-bottom: 20px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .readonly { background: #eee !important; }

        .wa-btn { display: block; background: #25d366; color: #fff; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: 700; margin-bottom: 10px; text-align: center; font-size: 14px; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 500; }
        .btn-checkout { background: var(--ifood-red); color: #fff; border: none; padding: 14px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Chris Gastronomia</div>

    <div class="banner-container">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800">
    </div>

    <div class="cat-bar">
        <button class="cat-card active" onclick="filter('todos', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=100"></div><div class="cat-name">INICIO</div></button>
        <button class="cat-card" onclick="filter('marmita', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100"></div><div class="cat-name">MARMITEX</div></button>
        <button class="cat-card" onclick="filter('batata', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=100"></div><div class="cat-name">BATATAS</div></button>
        <button class="cat-card" onclick="filter('bebida', this)"><div class="cat-circle"><img src="https://images.unsplash.com/photo-1581009146145-b5ef03a7403f?w=100"></div><div class="cat-name">BEBIDAS</div></button>
    </div>

    <div id="lista"></div>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <div class="resumo-pedido">
                <h3 style="margin: 0 0 15px 0;">Seu Pedido</h3>
                <div id="resumo-lista"></div>
                <div style="font-weight: 700; margin-top: 10px; text-align: right;">Total: R$ <span id="resumo-total">0,00</span></div>
            </div>

            <div class="address-form">
                <h3 style="font-size: 16px;">Onde entregar?</h3>
                <div class="input-group">
                    <input type="text" id="cep" placeholder="CEP" onblur="buscarEndereco()" maxlength="8">
                    <input type="text" id="numero" placeholder="Nº">
                </div>
                <input type="text" id="rua" placeholder="Rua / Avenida" class="readonly" readonly style="margin-bottom: 8px;">
                <input type="text" id="bairro" placeholder="Bairro" class="readonly" readonly style="margin-bottom: 8px;">
                <input type="text" id="complemento" placeholder="Referência/Complemento">
            </div>

            <a href="#" class="wa-btn" onclick="enviar('5512997136890')">ATENDIMENTO 1 (Final 6890)</a>
            <a href="#" class="wa-btn" style="background:#128c7e" onclick="enviar('5512981906835')">ATENDIMENTO 2 (Final 6835)</a>
            
            <button onclick="fecharModal()" style="background:none; border:none; color:var(--text-light); margin-top:10px; cursor:pointer; font-weight:700;">← Alterar Pedido</button>
        </div>
    </div>

    <div class="footer">
        <div><div style="font-size: 11px; color: var(--text-light);">Subtotal</div><div style="font-size: 18px; font-weight: 700;">R$ <span id="total">0,00</span></div></div>
        <button class="btn-checkout" onclick="abrirModal()">Concluir Pedido</button>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: 'marmita', nome: "Marmitex Executiva", sizes: { "P": 17.00, "M": 22.00, "G": 27.00 } },
            { id: 2, cat: 'batata', nome: "Batata Strogonoff", sizes: { "Padrão": 25.00 } },
            { id: 3, cat: 'batata', nome: "Batata Frango", sizes: { "Padrão": 25.00 } },
            { id: 4, cat: 'batata', nome: "Batata Calabresa", sizes: { "Padrão": 25.00 } },
            { id: 5, cat: 'bebida', nome: "Coca-Cola", sizes: { "Lata": 6.00, "600ml": 9.00, "2L": 14.00 } }
        ];

        let cart = []; let selection = {};

        function buscarEndereco() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r => r.json()).then(d => {
                    if (!d.erro) { document.getElementById('rua').value = d.logradouro; document.getElementById('bairro').value = d.bairro; }
                });
            }
        }

        function render(itens = produtos) {
            const container = document.getElementById('lista');
            container.innerHTML = itens.map(p => {
                const s = selection[p.id] || Object.keys(p.sizes)[0];
                selection[p.id] = s;
                const item = cart.find(i => i.id === p.id && i.size === s) || {qtd: 0};
                return `
                    <div class="menu-item">
                        <div class="item-title">${p.nome}</div>
                        <div class="size-box">${Object.keys(p.sizes).map(sz => `<button class="size-btn ${sz === s ? 'active' : ''}" onclick="setSize(${p.id}, '${sz}')">${sz}</button>`).join('')}</div>
                        <div class="item-footer">
                            <div class="price">R$ ${p.sizes[s].toFixed(2).replace('.',',')}</div>
                            <div class="qty-box"><button class="btn-q" onclick="update(${p.id}, -1)">-</button><span>${item.qtd}</span><button class="btn-q" onclick="update(${p.id}, 1)">+</button></div>
                        </div>
                    </div>`;
            }).join('');
            atualizarTotal();
        }

        function renderResumo() {
            const container = document.getElementById('resumo-lista');
            if(cart.length === 0) { fecharModal(); return; }
            container.innerHTML = cart.map(i => `
                <div class="resumo-item">
                    <span>${i.nome} (${i.size})</span>
                    <div class="qty-box">
                        <button class="btn-q" onclick="update(${i.id}, -1, true)">-</button>
                        <span>${i.qtd}</span>
                        <button class="btn-q" onclick="update(${i.id}, 1, true)">+</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('resumo-total').innerText = document.getElementById('total').innerText;
        }

        function setSize(id, sz) { selection[id] = sz; render(); }

        function update(id, d, isResumo = false) {
            const s = selection[id];
            const p = produtos.find(x => x.id === id);
            const idx = cart.findIndex(i => i.id === id && i.size === s);
            if (idx > -1) { cart[idx].qtd += d; if (cart[idx].qtd <= 0) cart.splice(idx, 1); }
            else if (d > 0) cart.push({ id, nome: p.nome, size: s, preco: p.sizes[s], qtd: 1 });
            render();
            if(isResumo) renderResumo();
        }

        function atualizarTotal() {
            const total = cart.reduce((acc, i) => acc + (i.preco * i.qtd), 0).toFixed(2).replace('.',',');
            document.getElementById('total').innerText = total;
        }

        function filter(c, b) {
            document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            render(c === 'todos' ? produtos : produtos.filter(p => p.cat === c));
        }

        function abrirModal() { if(!cart.length) return alert("Seu carrinho está vazio!"); renderResumo(); document.getElementById('checkoutModal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('checkoutModal').style.display = 'none'; }

        function enviar(num) {
            const r = document.getElementById('rua').value; const n = document.getElementById('numero').value;
            if(!r || !n) return alert("Preencha o CEP e o Número!");
            let msg = `*PEDIDO - CHRIS GASTRONOMIA*\n\n`;
            cart.forEach(i => msg += `• ${i.qtd}x ${i.nome} (${i.size})\n`);
            msg += `\n*ENTREGA:* ${r}, ${n}\n*REF:* ${document.getElementById('complemento').value}\n\n*TOTAL: R$ ${document.getElementById('total').innerText}*`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
        }
        render();
    </script>
</body>
</html>
