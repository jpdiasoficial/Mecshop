<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÓ GELADOS | OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --green: #25d366; --blue: #007bff; --bg: #f4f7f6; --dark: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--dark); padding-bottom: 100px; }
        
        /* Slide Principal */
        .hero { width: 100%; height: 220px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1501443762994-82bd5dabb892?w=800'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; border-radius: 0 0 25px 25px; }
        .hero h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .hero p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

        /* Busca e Categorias */
        .search-section { padding: 0 20px; margin-top: -30px; }
        .search-bar { background: #fff; display: flex; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 16px; font-weight: 500; }
        
        .cats { display: flex; overflow-x: auto; padding: 20px; gap: 10px; scrollbar-width: none; }
        .cat-card { background: #fff; padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 700; white-space: nowrap; border: 1px solid #ddd; cursor: pointer; }
        .cat-card.active { background: var(--dark); color: #fff; border-color: var(--dark); }

        /* Vitrine Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .card { background: #fff; border-radius: 20px; padding: 12px; border: 1px solid #eee; position: relative; display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 120px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
        .name { font-size: 13px; font-weight: 700; line-height: 1.2; height: 32px; margin-bottom: 5px; }
        .price { font-size: 16px; font-weight: 800; color: var(--blue); }
        .atacado-tag { font-size: 10px; color: #27ae60; font-weight: 800; margin-bottom: 10px; }
        
        /* Botões */
        .btn-add { background: var(--dark); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .qty-controls { display: flex; align-items: center; justify-content: space-between; background: #f1f3f5; border-radius: 12px; padding: 5px; }
        .btn-qty { background: #fff; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* Rodapé Carrinho */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px 25px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; z-index: 100; }
        .btn-check { background: var(--green); color: #fff; border: none; padding: 15px 30px; border-radius: 15px; font-weight: 800; font-size: 14px; cursor: pointer; }

        /* Modal Checkout */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 200; align-items: flex-end; }
        .modal-body { background: #fff; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .form-input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; font-family: 'Inter'; font-size: 15px; box-sizing: border-box; }
        .summary { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>SÓ GELADOS</h1>
        <p>O melhor sorvete da região</p>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="search" oninput="render()" placeholder="Qual sabor você busca?">
        </div>
    </div>

    <div class="cats">
        <div class="cat-card active" onclick="filter('Tudo', this)">Tudo</div>
        <div class="cat-card" onclick="filter('Potes', this)">Potes 2L</div>
        <div class="cat-card" onclick="filter('Picolés', this)">Picolés</div>
    </div>

    <div id="vitrine" class="grid"></div>

    <div class="footer">
        <div>
            <span style="font-size: 11px; font-weight: 700; color: #888;">TOTAL</span><br>
            <span style="font-size: 22px; font-weight: 900;">R$ <span id="total-val">0,00</span></span>
        </div>
        <button class="btn-check" onclick="openCheckout()">FINALIZAR</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-body">
            <h2 style="margin-top: 0;">Resumo do Pedido</h2>
            <div id="resumo-lista" class="summary"></div>
            
            <input type="text" id="cupom" class="form-input" style="border: 1px dashed var(--green)" placeholder="CUPOM DE DESCONTO" oninput="updateTotal()">
            <input type="text" id="nome" class="form-input" placeholder="Nome Completo">
            <input type="tel" id="cep" class="form-input" placeholder="Seu CEP" onblur="buscarEndereco()" maxlength="9">
            <input type="text" id="endereco" class="form-input" placeholder="Endereço e Número" id="rua">
            <input type="text" id="bairro" class="form-input" placeholder="Bairro">

            <button class="btn-check" style="width: 100%; padding: 20px; margin-top: 10px;" onclick="sendWhatsApp()">PEDIR AGORA NO WHATSAPP</button>
            <button onclick="closeModal()" style="width: 100%; border: none; background: none; color: #999; margin-top: 15px; font-weight: 600;">Voltar</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, cat: "Potes", nome: "Leitinho Trufado 2L", preco: 45.0, atacado: 38.0, min: 10, img: "https://images.unsplash.com/photo-1501443762994-82bd5dabb892?w=400" },
            { id: 2, cat: "Potes", nome: "Ferrero Rocher 2L", preco: 48.0, atacado: 42.0, min: 10, img: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400" },
            { id: 3, cat: "Picolés", nome: "Skimo Tradicional", preco: 7.0, atacado: 2.8, min: 20, img: "https://images.unsplash.com/photo-1505394033323-424ebb43ef2e?w=400" },
            { id: 4, cat: "Picolés", nome: "Fruta Especial", preco: 5.0, atacado: 2.2, min: 20, img: "https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=400" }
        ];

        let cart = [];
        let currentCat = "Tudo";

        function render() {
            const vitrine = document.getElementById('vitrine');
            const busca = document.getElementById('search').value.toLowerCase();
            vitrine.innerHTML = "";

            produtos.filter(p => (currentCat === "Tudo" || p.cat === currentCat) && p.nome.toLowerCase().includes(busca))
            .forEach(p => {
                const inCart = cart.find(c => c.id === p.id);
                vitrine.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" class="img-box">
                        <span class="name">${p.nome}</span>
                        <span class="price">R$ ${p.preco.toFixed(2)}</span>
                        <span class="atacado-tag">Atacado: R$ ${p.atacado.toFixed(2)} (mín ${p.min})</span>
                        ${inCart ? `
                            <div class="qty-controls">
                                <button class="btn-qty" onclick="qty(${p.id}, -1)">-</button>
                                <strong>${inCart.qtd}</strong>
                                <button class="btn-qty" onclick="qty(${p.id}, 1)">+</button>
                            </div>
                        ` : `<button class="btn-add" onclick="qty(${p.id}, 1)">ADICIONAR</button>`}
                    </div>
                `;
            });
            updateTotal();
        }

        function qty(id, d) {
            const i = cart.findIndex(c => c.id === id);
            if (i > -1) {
                cart[i].qtd += d;
                if (cart[i].qtd <= 0) cart.splice(i, 1);
            } else {
                cart.push({...produtos.find(p => p.id === id), qtd: 1});
            }
            render();
        }

        function updateTotal() {
            let total = cart.reduce((acc, i) => {
                const pUnit = i.qtd >= i.min ? i.atacado : i.preco;
                return acc + (pUnit * i.qtd);
            }, 0);
            
            const cupom = document.getElementById('cupom').value.toUpperCase();
            if(cupom === "MEC10") total *= 0.9;
            
            document.getElementById('total-val').innerText = total.toFixed(2).replace('.',',');
        }

        function filter(c, btn) {
            currentCat = c;
            document.querySelectorAll('.cat-card').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function openCheckout() {
            if(cart.length === 0) return alert("Carrinho vazio!");
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('resumo-lista').innerHTML = cart.map(i => `• ${i.qtd}x ${i.nome} ${i.qtd >= i.min ? '(Atacado)' : ''}`).join('<br>');
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function buscarEndereco() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if(cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r => r.json()).then(d => {
                    if(!d.erro) {
                        document.getElementById('endereco').value = d.logradouro;
                        document.getElementById('bairro').value = d.bairro;
                    }
                });
            }
        }

        function sendWhatsApp() {
            const n = document.getElementById('nome').value;
            const e = document.getElementById('endereco').value;
            const b = document.getElementById('bairro').value;
            const c = document.getElementById('cupom').value;
            if(!n || !e) return alert("Preencha Nome e Endereço!");

            let msg = `*PEDIDO - SÓ GELADOS*\n\n*NOME:* ${n}\n*END:* ${e}, ${b}\n*CUPOM:* ${c || 'Nenhum'}\n\n*ITENS:*\n`;
            cart.forEach(i => {
                const unit = i.qtd >= i.min ? i.atacado : i.preco;
                msg += `• ${i.qtd}x ${i.nome} (R$ ${unit.toFixed(2)} un)\n`;
            });
            msg += `\n*TOTAL: R$ ${document.getElementById('total-val').innerText}*`;
            
            // NÚMERO DO ALLAN (EXEMPLO)
            window.open(`https://wa.me/5511999999999?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
