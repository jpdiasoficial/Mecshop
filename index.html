<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOJA MEC SHOP | OFICIAL</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        
        /* Banner / Slide */
        .banner { width: 100%; background: #000; text-align: center; }
        .banner img { width: 100%; max-width: 600px; display: block; margin: 0 auto; }

        /* Grade de Produtos */
        .container { display: flex; justify-content: center; gap: 15px; padding: 20px; flex-wrap: wrap; margin-bottom: 200px; }
        .product-card { background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 160px; padding: 12px; text-align: center; }
        .product-card img { width: 100%; border-radius: 10px; }
        .product-card h3 { font-size: 14px; margin: 8px 0; color: #333; }
        .price-new { color: #00a8e8; font-size: 18px; font-weight: bold; }
        
        /* Controles de Quantidade */
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 10px 0; }
        .qty-btn { background: #eee; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }

        .btn-add { background: #00a8e8; color: #fff; border: none; padding: 8px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* CARRINHO FIXO (IGUAL A IMAGEM) */
        .cart-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); padding: 15px 0; z-index: 999; border-radius: 20px 20px 0 0; }
        
        /* Nomes e Quantidade no Carrinho */
        #cart-items-list { font-size: 12px; text-align: center; margin-bottom: 10px; color: #555; padding: 0 20px; }

        .cart-buttons { display: flex; justify-content: center; gap: 10px; padding: 0 15px; }
        .btn-clear { background: #ff5e5e; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-finish { background: #2ecc71; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; flex-grow: 1; font-size: 16px; cursor: pointer; }

        /* Pagamentos embaixo dos botões */
        .pay-footer { text-align: center; margin-top: 10px; }
        .pay-footer img { width: 180px; filter: grayscale(1); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="banner">
        <img src="https://via.placeholder.com/600x300/000/00f2ff?text=LOJA+MEC+SHOP+ACHADOS" id="slide" alt="Banner">
    </div>

    <div class="container">
        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Produto 1">
            <h3>Tênis Confort Plus</h3>
            <p class="price-new">R$ 50,00</p>
            <button class="btn-add" onclick="adicionar('Tênis Confort Plus', 50)">ADICIONAR</button>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/150" alt="Produto 2">
            <h3>Fone Bluetooth Pro</h3>
            <p class="price-new">R$ 80,00</p>
            <button class="btn-add" onclick="adicionar('Fone Bluetooth Pro', 80)">ADICIONAR</button>
        </div>
    </div>

    <div class="cart-fixed">
        <div id="cart-items-list">Seu carrinho está vazio</div>
        
        <div class="cart-buttons">
            <button class="btn-clear" onclick="limpar()">LIMPAR</button>
            <button class="btn-finish" onclick="finalizar()">FINALIZAR (Total: R$ <span id="total-val">0,00</span>)</button>
        </div>

        <div class="pay-footer">
            <p style="font-size: 10px; margin: 5px 0;">FORMAS DE PAGAMENTO SEGURAS</p>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Logo%E2%80%94pix.png/1200px-Logo%E2%80%94pix.png" alt="Pagamentos">
        </div>
    </div>

    <script>
        let carrinho = {};
        let total = 0;

        function adicionar(nome, preco) {
            if (carrinho[nome]) {
                carrinho[nome].qtd += 1;
            } else {
                carrinho[nome] = { qtd: 1, preco: preco };
            }
            atualizarCarrinho();
        }

        function limpar() {
            carrinho = {};
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('cart-items-list');
            const totalTxt = document.getElementById('total-val');
            let texto = "";
            let soma = 0;

            for (let item in carrinho) {
                texto += `${item} (x${carrinho[item].qtd}) | `;
                soma += carrinho[item].qtd * carrinho[item].preco;
            }

            lista.innerText = texto || "Seu carrinho está vazio";
            totalTxt.innerText = soma.toFixed(2);
        }

        function finalizar() {
            if (Object.keys(carrinho).length === 0) return alert("Adicione produtos!");
            alert("Pedido enviado! Total: R$ " + document.getElementById('total-val').innerText);
            // Aqui podemos colocar o link do seu WhatsApp depois!
        }
    </script>
</body>
</html>
